<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepDart - Hardware Zoom</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; }
        .container { position: relative; width: 100vw; height: 70vh; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        video { position: absolute; opacity: 0; pointer-events: none; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; background: #000; }
        #ui { background: #222; padding: 15px; border-top: 2px solid #444; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; height: 30vh; }
        .zoom-wrap { margin-bottom: 10px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        input[type=range] { flex-grow: 1; }
        .btn { padding: 15px; background: #27ae60; border: none; color: white; border-radius: 5px; width: 100%; font-weight: bold; font-size: 1.1rem; }
    </style>
</head>
<body>

    <div class="container">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
    </div>

    <div id="ui">
        <div class="zoom-wrap">
            <span id="zoom-label">ZOOM: 1x</span>
            <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
        </div>
        <button class="btn" onclick="captureReference()">KALIBRERA (TÖM TAVLAN)</button>
        <h2 id="last-hit" style="color: #2ecc71; margin: 10px 0; font-size: 1.8rem;">VÄNTAR...</h2>
    </div>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const hitEl = document.getElementById('last-hit');
const zoomSlider = document.getElementById('zoom-slider');
const zoomLabel = document.getElementById('zoom-label');

let refFrame = null;
let isCalibrated = false;
let board = { x: 0, y: 0, r: 0 }; 
let lastTip = null;
let cooldown = 0;
let videoTrack = null;
let supportsHardwareZoom = false;

navigator.mediaDevices.getUserMedia({ 
    video: { 
        width: { ideal: 1920 },
        height: { ideal: 1080 },
        facingMode: "environment" 
    } 
}).then(s => { 
    video.srcObject = s;
    videoTrack = s.getVideoTracks()[0];
    
    // Kolla om kameran stöder hårdvaru-zoom
    const capabilities = videoTrack.getCapabilities();
    if (capabilities.zoom) {
        supportsHardwareZoom = true;
        zoomSlider.min = capabilities.zoom.min;
        zoomSlider.max = capabilities.zoom.max;
        zoomSlider.step = capabilities.zoom.step;
        console.log("Hårdvaruzoom stöds!");
    }

    video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        board.x = canvas.width / 2;
        board.y = canvas.height / 2;
        board.r = Math.min(canvas.width, canvas.height) * 0.4;
        video.play();
        requestAnimationFrame(process);
    };
});

zoomSlider.oninput = () => {
    const val = zoomSlider.value;
    zoomLabel.innerText = `ZOOM: ${val}x`;
    
    if (supportsHardwareZoom) {
        // Försök zooma med den RIKTIGA linsen
        videoTrack.applyConstraints({ advanced: [{ zoom: val }] });
    }
};

function captureReference() {
    // Vid kalibrering ritar vi av den nuvarande (inzoomade) bilden som referens
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    refFrame = new Uint8ClampedArray(frame.data);
    isCalibrated = true;
    lastTip = null;
    hitEl.innerText = "REDO!";
}

function process() {
    const zoom = parseFloat(zoomSlider.value);
    
    if (supportsHardwareZoom) {
        // Om hårdvaran sköter zoomen, ritar vi bara hela bilden rakt av
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    } else {
        // DIGITAL FALLBACK: Om hårdvaruzoom inte funkar, kör vi gamla metoden
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        const sw = vw / zoom;
        const sh = vh / zoom;
        const sx = (vw - sw) / 2;
        const sy = (vh - sh) / 2;
        ctx.drawImage(video, sx, sy, sw, sh, 0, 0, canvas.width, canvas.height);
    }
    
    if (isCalibrated && cooldown <= 0) {
        const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let movements = [];
        const sensitivity = 35;
        const step = 4;

        for (let y = Math.floor(board.y - board.r); y < board.y + board.r; y += step) {
            for (let x = Math.floor(board.x - board.r); x < board.x + board.r; x += step) {
                const idx = (y * canvas.width + x) * 4;
                const diff = refFrame[idx] - currentFrame[idx]; // Mörkare pixel check
                
                if (diff > sensitivity) {
                    const dx = x - board.x;
                    const dy = y - board.y;
                    if (dx*dx + dy*dy < board.r*board.r) {
                        movements.push({x, y});
                    }
                }
            }
        }

        if (movements.length > 12 && movements.length < 1200) {
            let closestDist = Infinity;
            let tipX = 0, tipY = 0;

            for (let m of movements) {
                const d = Math.pow(m.x - board.x, 2) + Math.pow(m.y - board.y, 2);
                if (d < closestDist) {
                    closestDist = d;
                    tipX = m.x; tipY = m.y;
                }
            }

            if (tipX > 0) {
                lastTip = { x: tipX, y: tipY };
                hitEl.innerText = "TRÄFF: " + calculateScore(tipX, tipY);
                refFrame = new Uint8ClampedArray(currentFrame);
                cooldown = 25;
            }
        }
    }
    
    if (cooldown > 0) cooldown--;
    drawOverlay();
    requestAnimationFrame(process);
}

function calculateScore(x, y) {
    const dx = x - board.x;
    const dy = y - board.y;
    const dist = Math.sqrt(dx*dx + dy*dy);
    const pct = dist / board.r;

    if (pct > 1.0) return "MISS";
    if (pct < 0.035) return "BULL (50)";
    if (pct < 0.08) return "BULL (25)";

    const segments = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
    let angle = Math.atan2(dy, dx) * (180 / Math.PI);
    angle = (angle + 90 + 9) % 360;
    if (angle < 0) angle += 360;
    const baseScore = segments[Math.floor(angle / 18)];

    if (pct > 0.92) return `D${baseScore}`;
    if (pct > 0.55 && pct < 0.62) return `T${baseScore}`;
    return baseScore.toString();
}

function drawOverlay() {
    ctx.lineWidth = 4;
    ctx.strokeStyle = "rgba(0, 255, 0, 0.3)";
    ctx.beginPath();
    ctx.arc(board.x, board.y, board.r, 0, Math.PI * 2);
    ctx.arc(board.x, board.y, board.r * 0.92, 0, Math.PI * 2);
    ctx.stroke();
    
    ctx.strokeStyle = "rgba(255, 0, 0, 0.2)";
    ctx.beginPath();
    ctx.arc(board.x, board.y, board.r * 0.62, 0, Math.PI * 2);
    ctx.arc(board.x, board.y, board.r * 0.55, 0, Math.PI * 2);
    ctx.stroke();

    if (lastTip) {
        ctx.fillStyle = "#00d2ff";
        ctx.beginPath();
        ctx.arc(lastTip.x, lastTip.y, 8, 0, Math.PI*2);
        ctx.fill();
    }
}
</script>
</body>
</html>
