<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepDart Pro - Precision Edition</title>
    <style>
        body { background: #121212; color: white; font-family: -apple-system, sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        .container { position: relative; width: 100vw; height: 60vh; background: #000; display: flex; align-items: center; justify-content: center; overflow: hidden; }
        canvas { max-width: 100%; max-height: 100%; object-fit: contain; touch-action: none; display: block; }
        video { position: absolute; opacity: 0; pointer-events: none; }
        #ui { background: #1c1c1e; height: 40vh; padding: 15px; border-top: 1px solid #38383a; box-sizing: border-box; display: flex; flex-direction: column; gap: 8px; }
        .slider-wrap { display: flex; align-items: center; gap: 12px; background: #2c2c2e; padding: 10px; border-radius: 12px; }
        input[type=range] { flex-grow: 1; height: 30px; accent-color: #0a84ff; }
        #hit-display { color: #32d74b; font-size: 2.2rem; font-weight: 900; text-align: center; margin: 2px 0; }
        .btn-row { display: flex; gap: 10px; }
        .btn { flex: 2; padding: 16px; background: #ff9500; border: none; color: white; border-radius: 14px; font-weight: bold; font-size: 1.1rem; }
        .btn-reset { flex: 1; background: #48484a; }
        .hint { font-size: 0.75rem; color: #8e8e93; text-align: center; }
    </style>
</head>
<body>

    <div class="container">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
    </div>

    <div id="ui">
        <div class="slider-wrap">
            <span id="zoom-label" style="font-weight:600; min-width:85px;">ZOOM: 1.0x</span>
            <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
        </div>
        <div id="hit-display">VÄNTAR...</div>
        <div class="btn-row">
            <button class="btn btn-reset" onclick="resetPoints()">RESET</button>
            <button class="btn" onclick="captureReference()">KALIBRERA</button>
        </div>
        <div class="hint">Flytta ringarna till ytterkant: 20, 6, 3, 11</div>
    </div>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const hitEl = document.getElementById('hit-display');
const zoomSlider = document.getElementById('zoom-slider');
const zoomLabel = document.getElementById('zoom-label');

let refFrame = null;
let isCalibrated = false;
let videoTrack = null;
let supportsHardwareZoom = false;
let lastTip = null;
let lastTouchPos = null;

let points = [
    { x: 0, y: 0, color: '#ff3b30', label: '20' },
    { x: 0, y: 0, color: '#007aff', label: '6' },
    { x: 0, y: 0, color: '#ffcc00', label: '3' },
    { x: 0, y: 0, color: '#34c759', label: '11' }
];
let draggedPoint = null;

navigator.mediaDevices.getUserMedia({ 
    video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: "environment" } 
}).then(s => { 
    video.srcObject = s;
    videoTrack = s.getVideoTracks()[0];
    const caps = videoTrack.getCapabilities();
    if (caps.zoom) {
        supportsHardwareZoom = true;
        zoomSlider.min = caps.zoom.min;
        zoomSlider.max = caps.zoom.max;
        zoomSlider.step = caps.zoom.step;
    }
    video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        resetPoints();
        video.play();
        requestAnimationFrame(process);
    };
});

function resetPoints() {
    const w = canvas.width, h = canvas.height;
    const size = Math.min(w, h) * 0.25;
    points[0].x = w/2; points[0].y = h/2 - size;
    points[1].x = w/2 + size; points[1].y = h/2;
    points[2].x = w/2; points[2].y = h/2 + size;
    points[3].x = w/2 - size; points[3].y = h/2;
    isCalibrated = false;
}

function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
    };
}

canvas.addEventListener('touchstart', e => {
    const pos = getMousePos(e);
    points.forEach(p => {
        if (Math.sqrt((p.x - pos.x)**2 + (p.y - pos.y)**2) < 100) {
            draggedPoint = p;
            lastTouchPos = pos;
        }
    });
}, {passive: false});

window.addEventListener('touchmove', e => {
    if (draggedPoint) {
        const pos = getMousePos(e);
        // Offset: Flytta punkten ca 15% av skärmhöjden ovanför fingret
        draggedPoint.x = pos.x;
        draggedPoint.y = pos.y - (canvas.height * 0.1); 
        lastTouchPos = pos;
        isCalibrated = false;
        e.preventDefault();
    }
}, {passive: false});

window.addEventListener('touchend', () => { draggedPoint = null; lastTouchPos = null; });

zoomSlider.oninput = () => {
    const val = parseFloat(zoomSlider.value);
    zoomLabel.innerText = `ZOOM: ${val.toFixed(1)}x`;
    if (supportsHardwareZoom) videoTrack.applyConstraints({ advanced: [{ zoom: val }] });
    isCalibrated = false;
};

function captureReference() {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    refFrame = new Uint8ClampedArray(ctx.getImageData(0,0,canvas.width,canvas.height).data);
    isCalibrated = true;
    lastTip = null;
    hitEl.innerText = "REDO!";
}

function process() {
    // Rita kamerabild (med digital zoom om hårdvaruzoom saknas)
    if (supportsHardwareZoom) {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    } else {
        const z = parseFloat(zoomSlider.value);
        const sw = video.videoWidth/z, sh = video.videoHeight/z;
        ctx.drawImage(video, (video.videoWidth-sw)/2, (video.videoHeight-sh)/2, sw, sh, 0, 0, canvas.width, canvas.height);
    }
    
    if (isCalibrated) {
        const currentFrame = ctx.getImageData(0,0,canvas.width,canvas.height).data;
        let moves = [];
        for(let y=100; y<canvas.height-100; y+=7) {
            for(let x=100; x<canvas.width-100; x+=7) {
                const i = (y*canvas.width+x)*4;
                if(refFrame[i]-currentFrame[i] > 45) moves.push({x,y});
            }
        }
        if(moves.length > 15 && moves.length < 1500) {
            const center = getLineIntersection(points[0], points[2], points[1], points[3]);
            let sX=0, sY=0; moves.forEach(m=>{sX+=m.x; sY+=m.y;});
            const avgX=sX/moves.length, avgY=sY/moves.length;
            const vX=center.x-avgX, vY=center.y-avgY, mag=Math.sqrt(vX*vX+vY*vY);
            let bT=null, mP=-Infinity;
            moves.forEach(m=>{
                const p = (m.x-avgX)*(vX/mag) + (m.y-avgY)*(vY/mag);
                if(p>mP){ mP=p; bT=m; }
            });
            if(bT) { lastTip = bT; hitEl.innerText = calculateScore(bT, center); refFrame = new Uint8ClampedArray(currentFrame); }
        }
    }
    drawOverlay();
    requestAnimationFrame(process);
}

function getLineIntersection(p1,p2,p3,p4) {
    const d = (p4.y-p3.y)*(p2.x-p1.x)-(p4.x-p3.x)*(p2.y-p1.y);
    return d===0 ? {x:canvas.width/2, y:canvas.height/2} : { x: p1.x+((p4.x-p3.x)*(p1.y-p3.y)-(p4.y-p3.y)*(p1.x-p3.x))/d*(p2.x-p1.x), y: p1.y+((p4.x-p3.x)*(p1.y-p3.y)-(p4.y-p3.y)*(p1.x-p3.x))/d*(p2.y-p1.y) };
}

function calculateScore(tip, center) {
    const dx=tip.x-center.x, dy=tip.y-center.y;
    let ang = (Math.atan2(dy,dx)*(180/Math.PI)+108)%360; if(ang<0) ang+=360;
    const r = (Math.abs(points[0].y-center.y) + Math.abs(points[1].x-center.x))/2;
    const pct = Math.sqrt(dx*dx+dy*dy)/r;
    if(pct>1.05) return "MISS"; if(pct<0.04) return "BULL (50)"; if(pct<0.09) return "BULL (25)";
    const segs = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
    const b = segs[Math.floor(ang/18)];
    if(pct>0.93) return "D"+b; if(pct>0.56 && pct<0.64) return "T"+b;
    return b.toString();
}

function drawOverlay() {
    // 1. Linjer
    ctx.lineWidth = 2; ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.setLineDash([10,10]);
    ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y); ctx.lineTo(points[2].x, points[2].y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(points[1].x, points[1].y); ctx.lineTo(points[3].x, points[3].y); ctx.stroke();
    ctx.setLineDash([]);

    // 2. Punkter
    points.forEach(p => {
        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 30, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
        ctx.fillStyle = "white"; ctx.font = "bold 35px sans-serif"; ctx.textAlign = "center";
        ctx.fillText(p.label, p.x, p.y + 12);
    });

    // 3. Magnifier (Hjälper användaren att se under fingret)
    if (draggedPoint && lastTouchPos) {
        const magSize = 250;
        const magX = 20, magY = 20; // Position uppe i vänstra hörnet
        
        ctx.save();
        // Rita rund ram för förstoringsglaset
        ctx.beginPath(); ctx.arc(magX + magSize/2, magY + magSize/2, magSize/2, 0, Math.PI*2); ctx.clip();
        
        // Rita den förstorade bilden (från punktens nuvarande position)
        ctx.drawImage(canvas, draggedPoint.x - 50, draggedPoint.y - 50, 100, 100, magX, magY, magSize, magSize);
        
        // Rita sikte i mitten av förstoringsglaset
        ctx.strokeStyle = "white"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.moveTo(magX+magSize/2, magY); ctx.lineTo(magX+magSize/2, magY+magSize); ctx.stroke();
        ctx.beginPath(); ctx.moveTo(magX, magY+magSize/2); ctx.lineTo(magX+magSize, magY+magSize/2); ctx.stroke();
        
        ctx.restore();
        ctx.strokeStyle = draggedPoint.color; ctx.lineWidth = 5;
        ctx.strokeRect(magX, magY, magSize, magSize);
    }

    if(lastTip) { ctx.fillStyle = "#00d2ff"; ctx.beginPath(); ctx.arc(lastTip.x, lastTip.y, 15, 0, Math.PI*2); ctx.fill(); }
}
</script>
</body>
</html>
