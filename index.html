<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DeepDart Pro - Precision Edition</title>
    <style>
        body {
            background: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 60vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            touch-action: none;
            display: block;
        }

        video {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        #ui {
            background: #1c1c1e;
            height: 40vh;
            padding: 15px;
            border-top: 1px solid #38383a;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #2c2c2e;
            padding: 10px;
            border-radius: 12px;
        }

        input[type=range] {
            flex-grow: 1;
            height: 30px;
            accent-color: #0a84ff;
        }

        #hit-display {
            color: #32d74b;
            font-size: 2.2rem;
            font-weight: 900;
            text-align: center;
            margin: 2px 0;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 2;
            padding: 16px;
            background: #ff9500;
            border: none;
            color: white;
            border-radius: 14px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .btn-reset {
            flex: 1;
            background: #48484a;
        }

        .hint {
            font-size: 0.75rem;
            color: #8e8e93;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
    </div>

    <div id="ui">
        <div class="slider-wrap">
            <span id="zoom-label" style="font-weight:600; min-width:85px;">ZOOM: 1.0x</span>
            <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1" />
        </div>

        <div id="hit-display">VÄNTAR...</div>

        <div class="btn-row">
            <button class="btn btn-reset" onclick="resetPoints()">RESET</button>
            <button class="btn" onclick="captureReference()">KALIBRERA</button>
        </div>

        <div class="hint">Flytta ringarna till ytterkant: 20, 6, 3, 11</div>
    </div>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const hitEl = document.getElementById('hit-display');
const zoomSlider = document.getElementById('zoom-slider');
const zoomLabel = document.getElementById('zoom-label');

const offscreenCanvas = document.createElement('canvas');
const offscreenCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });

let refFrame = null;
let isCalibrated = false;
let videoTrack = null;
let supportsHardwareZoom = false;
let lastTip = null;
let lastTouchPos = null;
let draggedPoint = null;

let lastDetectionTime = 0;
let detectionCooldownMs = 1200;
let stableFramesAfterHit = 0;
let waitingForBoardToSettle = false;

let points = [
    { x: 0, y: 0, color: '#ff3b30', label: '20' },
    { x: 0, y: 0, color: '#007aff', label: '6' },
    { x: 0, y: 0, color: '#ffcc00', label: '3' },
    { x: 0, y: 0, color: '#34c759', label: '11' }
];

startCamera();

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                width: { ideal: 1920 },
                height: { ideal: 1080 },
                facingMode: { ideal: "environment" }
            },
            audio: false
        });

        video.srcObject = stream;
        videoTrack = stream.getVideoTracks()[0];

        const caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
        if (caps.zoom) {
            supportsHardwareZoom = true;
            zoomSlider.min = caps.zoom.min;
            zoomSlider.max = caps.zoom.max;
            zoomSlider.step = caps.zoom.step || 0.1;
            zoomSlider.value = Math.max(caps.zoom.min, 1);
        }

        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            offscreenCanvas.width = video.videoWidth;
            offscreenCanvas.height = video.videoHeight;

            resetPoints();
            video.play();
            requestAnimationFrame(process);
        };
    } catch (err) {
        console.error(err);
        hitEl.innerText = "KAMERA FEL";
    }
}

function resetPoints() {
    const w = canvas.width || 1280;
    const h = canvas.height || 720;
    const size = Math.min(w, h) * 0.25;

    points[0].x = w / 2;
    points[0].y = h / 2 - size;

    points[1].x = w / 2 + size;
    points[1].y = h / 2;

    points[2].x = w / 2;
    points[2].y = h / 2 + size;

    points[3].x = w / 2 - size;
    points[3].y = h / 2;

    isCalibrated = false;
    refFrame = null;
    lastTip = null;
    waitingForBoardToSettle = false;
    stableFramesAfterHit = 0;
    hitEl.innerText = "VÄNTAR...";
}

function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
    };
}

function pickDraggedPoint(pos) {
    let best = null;
    let bestDist = Infinity;

    for (const p of points) {
        const d = Math.hypot(p.x - pos.x, p.y - pos.y);
        if (d < 90 && d < bestDist) {
            best = p;
            bestDist = d;
        }
    }
    return best;
}

canvas.addEventListener('touchstart', (e) => {
    const pos = getPointerPos(e);
    draggedPoint = pickDraggedPoint(pos);
    if (draggedPoint) {
        lastTouchPos = pos;
        e.preventDefault();
    }
}, { passive: false });

window.addEventListener('touchmove', (e) => {
    if (!draggedPoint) return;

    const pos = getPointerPos(e);
    draggedPoint.x = pos.x;
    draggedPoint.y = pos.y - (canvas.height * 0.10);

    lastTouchPos = pos;
    isCalibrated = false;
    refFrame = null;
    hitEl.innerText = "KALIBRERA";
    e.preventDefault();
}, { passive: false });

window.addEventListener('touchend', () => {
    draggedPoint = null;
    lastTouchPos = null;
});

canvas.addEventListener('mousedown', (e) => {
    const pos = getPointerPos(e);
    draggedPoint = pickDraggedPoint(pos);
    lastTouchPos = pos;
});

window.addEventListener('mousemove', (e) => {
    if (!draggedPoint) return;
    const pos = getPointerPos(e);
    draggedPoint.x = pos.x;
    draggedPoint.y = pos.y;
    lastTouchPos = pos;
    isCalibrated = false;
    refFrame = null;
    hitEl.innerText = "KALIBRERA";
});

window.addEventListener('mouseup', () => {
    draggedPoint = null;
    lastTouchPos = null;
});

zoomSlider.oninput = async () => {
    const val = parseFloat(zoomSlider.value);
    zoomLabel.innerText = `ZOOM: ${val.toFixed(1)}x`;

    try {
        if (supportsHardwareZoom && videoTrack) {
            await videoTrack.applyConstraints({ advanced: [{ zoom: val }] });
        }
    } catch (err) {
        console.warn("Zoom kunde inte appliceras:", err);
    }

    isCalibrated = false;
    refFrame = null;
    lastTip = null;
    hitEl.innerText = "KALIBRERA";
};

function drawVideoFrame(targetCtx, targetCanvas) {
    if (supportsHardwareZoom) {
        targetCtx.drawImage(video, 0, 0, targetCanvas.width, targetCanvas.height);
    } else {
        const z = parseFloat(zoomSlider.value);
        const vw = video.videoWidth;
        const vh = video.videoHeight;

        const sw = vw / z;
        const sh = vh / z;
        const sx = (vw - sw) / 2;
        const sy = (vh - sh) / 2;

        targetCtx.drawImage(video, sx, sy, sw, sh, 0, 0, targetCanvas.width, targetCanvas.height);
    }
}

function captureReference() {
    if (!canvas.width || !canvas.height) return;

    drawVideoFrame(offscreenCtx, offscreenCanvas);
    refFrame = new Uint8ClampedArray(
        offscreenCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height).data
    );

    isCalibrated = true;
    lastTip = null;
    waitingForBoardToSettle = false;
    stableFramesAfterHit = 0;
    hitEl.innerText = "REDO!";
}

function process(timestamp) {
    if (!video.videoWidth || !video.videoHeight) {
        requestAnimationFrame(process);
        return;
    }

    drawVideoFrame(offscreenCtx, offscreenCanvas);
    const currentImage = offscreenCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height);
    const currentFrame = currentImage.data;

    ctx.drawImage(offscreenCanvas, 0, 0, canvas.width, canvas.height);

    if (isCalibrated && refFrame) {
        const now = performance.now();
        const canDetect = (now - lastDetectionTime) > detectionCooldownMs;

        const motion = detectMotion(refFrame, currentFrame, canvas.width, canvas.height);

        if (!waitingForBoardToSettle && canDetect && motion.moves.length > 25 && motion.moves.length < 2200) {
            const center = getBoardCenter();
            const tip = estimateTip(motion.moves, center);

            if (tip && isLikelyOnBoard(tip, center)) {
                lastTip = tip;
                hitEl.innerText = calculateScore(tip, center);
                lastDetectionTime = now;
                waitingForBoardToSettle = true;
                stableFramesAfterHit = 0;
            }
        } else if (waitingForBoardToSettle) {
            if (motion.moves.length < 12) {
                stableFramesAfterHit++;
            } else {
                stableFramesAfterHit = 0;
            }

            if (stableFramesAfterHit >= 8) {
                refFrame = new Uint8ClampedArray(currentFrame);
                waitingForBoardToSettle = false;
                stableFramesAfterHit = 0;
            }
        }
    }

    drawOverlay();
    requestAnimationFrame(process);
}

function detectMotion(reference, current, width, height) {
    const moves = [];

    const margin = 80;
    const step = 6;

    for (let y = margin; y < height - margin; y += step) {
        for (let x = margin; x < width - margin; x += step) {
            const i = (y * width + x) * 4;

            const dr = Math.abs(reference[i] - current[i]);
            const dg = Math.abs(reference[i + 1] - current[i + 1]);
            const db = Math.abs(reference[i + 2] - current[i + 2]);

            const diff = dr + dg + db;

            // kräver både total skillnad och att bilden blivit mörkare lite grand
            const darker =
                (reference[i] + reference[i + 1] + reference[i + 2]) -
                (current[i] + current[i + 1] + current[i + 2]);

            if (diff > 90 && darker > 20) {
                moves.push({ x, y });
            }
        }
    }

    return { moves };
}

function estimateTip(moves, center) {
    if (!moves.length) return null;

    let avgX = 0;
    let avgY = 0;

    for (const m of moves) {
        avgX += m.x;
        avgY += m.y;
    }

    avgX /= moves.length;
    avgY /= moves.length;

    const vx = center.x - avgX;
    const vy = center.y - avgY;
    const mag = Math.hypot(vx, vy);

    if (mag < 1) return null;

    let bestTip = null;
    let bestProj = -Infinity;

    for (const m of moves) {
        const proj = ((m.x - avgX) * vx / mag) + ((m.y - avgY) * vy / mag);
        if (proj > bestProj) {
            bestProj = proj;
            bestTip = m;
        }
    }

    return bestTip;
}

function getBoardCenter() {
    return getLineIntersection(points[0], points[2], points[1], points[3]);
}

function getBoardRadius(center) {
    const rTop = Math.hypot(points[0].x - center.x, points[0].y - center.y);
    const rRight = Math.hypot(points[1].x - center.x, points[1].y - center.y);
    const rBottom = Math.hypot(points[2].x - center.x, points[2].y - center.y);
    const rLeft = Math.hypot(points[3].x - center.x, points[3].y - center.y);

    return (rTop + rRight + rBottom + rLeft) / 4;
}

function isLikelyOnBoard(tip, center) {
    const r = getBoardRadius(center);
    const d = Math.hypot(tip.x - center.x, tip.y - center.y);
    return d <= r * 1.15;
}

function getLineIntersection(p1, p2, p3, p4) {
    const d =
        (p4.y - p3.y) * (p2.x - p1.x) -
        (p4.x - p3.x) * (p2.y - p1.y);

    if (Math.abs(d) < 0.0001) {
        return { x: canvas.width / 2, y: canvas.height / 2 };
    }

    const ua =
        ((p4.x - p3.x) * (p1.y - p3.y) -
         (p4.y - p3.y) * (p1.x - p3.x)) / d;

    return {
        x: p1.x + ua * (p2.x - p1.x),
        y: p1.y + ua * (p2.y - p1.y)
    };
}

function calculateScore(tip, center) {
    const dx = tip.x - center.x;
    const dy = tip.y - center.y;

    // 0° = rakt upp, ökar medurs, centrum av första sektor = 20
    let ang = (Math.atan2(dy, dx) * 180 / Math.PI + 99) % 360;
    if (ang < 0) ang += 360;

    const r = getBoardRadius(center);
    const dist = Math.hypot(dx, dy);
    const pct = dist / r;

    if (pct > 1.05) return "MISS";
    if (pct < 0.04) return "BULL (50)";
    if (pct < 0.09) return "BULL (25)";

    const segs = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
    const base = segs[Math.floor(ang / 18)];

    if (pct > 0.93) return "D" + base;
    if (pct > 0.56 && pct < 0.64) return "T" + base;

    return String(base);
}

function drawOverlay() {
    const center = getBoardCenter();
    const radius = getBoardRadius(center);

    // hjälplinjer
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(255,255,255,0.28)";
    ctx.setLineDash([10, 10]);

    ctx.beginPath();
    ctx.moveTo(points[0].x, points[0].y);
    ctx.lineTo(points[2].x, points[2].y);
    ctx.stroke();

    ctx.beginPath();
    ctx.moveTo(points[1].x, points[1].y);
    ctx.lineTo(points[3].x, points[3].y);
    ctx.stroke();

    ctx.setLineDash([]);

    // centrum
    ctx.fillStyle = "rgba(255,255,255,0.8)";
    ctx.beginPath();
    ctx.arc(center.x, center.y, 5, 0, Math.PI * 2);
    ctx.fill();

    // ytterring
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.arc(center.x, center.y, radius, 0, Math.PI * 2);
    ctx.stroke();

    // kalibreringspunkter
    for (const p of points) {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, 28, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "white";
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = "white";
        ctx.font = "bold 32px sans-serif";
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(p.label, p.x, p.y + 1);
    }

    // magnifier
    if (draggedPoint && lastTouchPos) {
        const magSize = 220;
        const magX = 20;
        const magY = 20;
        const srcSize = 120;

        ctx.save();
        ctx.beginPath();
        ctx.arc(magX + magSize / 2, magY + magSize / 2, magSize / 2, 0, Math.PI * 2);
        ctx.clip();

        let sx = draggedPoint.x - srcSize / 2;
        let sy = draggedPoint.y - srcSize / 2;

        sx = Math.max(0, Math.min(canvas.width - srcSize, sx));
        sy = Math.max(0, Math.min(canvas.height - srcSize, sy));

        ctx.drawImage(
            offscreenCanvas,
            sx, sy, srcSize, srcSize,
            magX, magY, magSize, magSize
        );

        // overlay-punkter även i förstoringsglas
        const scale = magSize / srcSize;
        const localX = magX + (draggedPoint.x - sx) * scale;
        const localY = magY + (draggedPoint.y - sy) * scale;

        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;

        ctx.beginPath();
        ctx.moveTo(magX + magSize / 2, magY);
        ctx.lineTo(magX + magSize / 2, magY + magSize);
        ctx.stroke();

        ctx.beginPath();
        ctx.moveTo(magX, magY + magSize / 2);
        ctx.lineTo(magX + magSize, magY + magSize / 2);
        ctx.stroke();

        ctx.strokeStyle = draggedPoint.color;
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(localX, localY, 16, 0, Math.PI * 2);
        ctx.stroke();

        ctx.restore();

        ctx.strokeStyle = draggedPoint.color;
        ctx.lineWidth = 5;
        ctx.strokeRect(magX, magY, magSize, magSize);
    }

    // senaste träff
    if (lastTip) {
        ctx.fillStyle = "#00d2ff";
        ctx.beginPath();
        ctx.arc(lastTip.x, lastTip.y, 13, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = "white";
        ctx.lineWidth = 2;
        ctx.stroke();
    }
}
</script>
</body>
</html>
