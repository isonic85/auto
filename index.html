<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepDart Pro - iPhone Optimized</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; overflow: hidden; touch-action: none; }
        
        /* Behållaren för kameran tar upp 65% av skärmen */
        .container { 
            position: relative; 
            width: 100vw; 
            height: 65vh; 
            background: #000; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        /* Canvasen skalas nu för att alltid synas i sin helhet */
        canvas { 
            max-width: 100%; 
            max-height: 100%; 
            object-fit: contain; 
            touch-action: none;
        }
        
        video { position: absolute; opacity: 0; pointer-events: none; }
        
        /* Kontrollpanelen tar upp resten av skärmen */
        #ui { 
            background: #222; 
            height: 35vh; 
            padding: 10px; 
            border-top: 2px solid #444; 
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .control-row { margin-bottom: 10px; }
        .slider-wrap { display: flex; align-items: center; gap: 10px; background: #333; padding: 10px; border-radius: 8px; }
        input[type=range] { flex-grow: 1; height: 25px; }

        #hit-display { 
            color: #2ecc71; 
            font-size: 2.2rem; 
            font-weight: bold; 
            text-shadow: 0 0 10px rgba(46, 204, 113, 0.3);
            margin: 5px 0;
        }
        
        .btn { 
            padding: 18px; 
            background: #e67e22; 
            border: none; 
            color: white; 
            border-radius: 8px; 
            width: 100%; 
            font-weight: bold; 
            font-size: 1.2rem; 
            box-shadow: 0 4px 0 #d35400;
        }
        .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 #d35400; }
        
        .hint { font-size: 0.75rem; color: #888; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="container">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
    </div>

    <div id="ui">
        <div class="control-row">
            <div class="hint">Dra punkter till: 20, 6, 3, 11</div>
            <div class="slider-wrap">
                <span id="zoom-label" style="min-width: 70px;">ZOOM: 1x</span>
                <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
            </div>
        </div>

        <div id="hit-display">VÄNTAR...</div>
        
        <button class="btn" onclick="captureReference()">KALIBRERA TAVLA</button>
    </div>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const hitEl = document.getElementById('hit-display');
const zoomSlider = document.getElementById('zoom-slider');
const zoomLabel = document.getElementById('zoom-label');

let refFrame = null;
let isCalibrated = false;
let videoTrack = null;
let supportsHardwareZoom = false;
let lastTip = null;

// Kalibreringspunkter
let points = [
    { x: 0, y: 0, color: '#ff4757', label: '20' },
    { x: 0, y: 0, color: '#1e90ff', label: '6' },
    { x: 0, y: 0, color: '#ffa502', label: '3' },
    { x: 0, y: 0, color: '#2ed573', label: '11' }
];
let draggedPoint = null;

navigator.mediaDevices.getUserMedia({ 
    video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: "environment" } 
}).then(s => { 
    video.srcObject = s;
    videoTrack = s.getVideoTracks()[0];
    const caps = videoTrack.getCapabilities();
    if (caps.zoom) {
        supportsHardwareZoom = true;
        zoomSlider.min = caps.zoom.min;
        zoomSlider.max = caps.zoom.max;
        zoomSlider.step = caps.zoom.step;
    }
    video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        resetPoints();
        video.play();
        requestAnimationFrame(process);
    };
});

function resetPoints() {
    const cx = canvas.width/2; const cy = canvas.height/2; const r = canvas.height * 0.35;
    points[0].x = cx; points[0].y = cy - r;
    points[1].x = cx + r; points[1].y = cy;
    points[2].x = cx; points[2].y = cy + r;
    points[3].x = cx - r; points[3].y = cy;
}

// Touch-logik anpassad för iPhone
function getMousePos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
    };
}

canvas.addEventListener('touchstart', e => {
    const pos = getMousePos(e);
    points.forEach(p => {
        if (Math.sqrt((p.x - pos.x)**2 + (p.y - pos.y)**2) < 60) draggedPoint = p;
    });
}, {passive: false});

window.addEventListener('touchmove', e => {
    if (draggedPoint) {
        const pos = getMousePos(e);
        draggedPoint.x = pos.x;
        draggedPoint.y = pos.y;
        isCalibrated = false;
        e.preventDefault();
    }
}, {passive: false});

window.addEventListener('touchend', () => draggedPoint = null);

zoomSlider.oninput = () => {
    zoomLabel.innerText = `ZOOM: ${parseFloat(zoomSlider.value).toFixed(1)}x`;
    if (supportsHardwareZoom) {
        videoTrack.applyConstraints({ advanced: [{ zoom: zoomSlider.value }] });
    }
    isCalibrated = false;
};

function getSw() { return video.videoWidth / parseFloat(zoomSlider.value); }
function getSh() { return video.videoHeight / parseFloat(zoomSlider.value); }
function getSx() { return (video.videoWidth - getSw()) / 2; }
function getSy() { return (video.videoHeight - getSh()) / 2; }

function captureReference() {
    if (supportsHardwareZoom) ctx.drawImage(video, 0, 0);
    else ctx.drawImage(video, getSx(), getSy(), getSw(), getSh(), 0, 0, canvas.width, canvas.height);
    refFrame = new Uint8ClampedArray(ctx.getImageData(0,0,canvas.width,canvas.height).data);
    isCalibrated = true;
    lastTip = null;
    hitEl.innerText = "REDO!";
}

function process() {
    if (supportsHardwareZoom) ctx.drawImage(video, 0, 0);
    else ctx.drawImage(video, getSx(), getSy(), getSw(), getSh(), 0, 0, canvas.width, canvas.height);
    
    if (isCalibrated) {
        const currentFrame = ctx.getImageData(0,0,canvas.width,canvas.height).data;
        let moves = [];
        const sens = 45;
        // Bounding box för snabbare sökning
        const xMin = Math.min(...points.map(p=>p.x))-20, xMax = Math.max(...points.map(p=>p.x))+20;
        const yMin = Math.min(...points.map(p=>p.y))-20, yMax = Math.max(...points.map(p=>p.y))+20;

        for(let y=Math.floor(yMin); y<yMax; y+=5) {
            for(let x=Math.floor(xMin); x<xMax; x+=5) {
                const i = (y*canvas.width+x)*4;
                if(refFrame[i]-currentFrame[i] > sens) moves.push({x,y});
            }
        }

        if(moves.length > 20 && moves.length < 2000) {
            const center = getLineIntersection(points[0], points[2], points[1], points[3]);
            let sumX=0, sumY=0; moves.forEach(m=>{sumX+=m.x; sumY+=m.y;});
            const avgX=sumX/moves.length, avgY=sumY/moves.length;
            const vX=center.x-avgX, vY=center.y-avgY;
            const mag=Math.sqrt(vX*vX+vY*vY);
            let bestT=null, maxP=-Infinity;
            moves.forEach(m=>{
                const p = (m.x-avgX)*(vX/mag) + (m.y-avgY)*(vY/mag);
                if(p>maxP){ maxP=p; bestT=m; }
            });
            if(bestT) {
                lastTip = bestT;
                hitEl.innerText = calculateScore(bestT, center);
                refFrame = new Uint8ClampedArray(currentFrame);
            }
        }
    }
    drawOverlay();
    requestAnimationFrame(process);
}

function getLineIntersection(p1,p2,p3,p4) {
    const d = (p4.y-p3.y)*(p2.x-p1.x)-(p4.x-p3.x)*(p2.y-p1.y);
    const ua = ((p4.x-p3.x)*(p1.y-p3.y)-(p4.y-p3.y)*(p1.x-p3.x))/d;
    return { x: p1.x+ua*(p2.x-p1.x), y: p1.y+ua*(p2.y-p1.y) };
}

function calculateScore(tip, center) {
    const dx=tip.x-center.x, dy=tip.y-center.y;
    let ang = Math.atan2(dy,dx)*(180/Math.PI)+90+9;
    if(ang<0) ang+=360;
    const r20 = Math.sqrt((points[0].x-center.x)**2+(points[0].y-center.y)**2);
    const pct = Math.sqrt(dx*dx+dy*dy)/r20;
    if(pct>1.05) return "MISS";
    if(pct<0.04) return "BULL (50)";
    if(pct<0.09) return "BULL (25)";
    const segs = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
    const b = segs[Math.floor((ang%360)/18)];
    if(pct>0.93) return "D"+b;
    if(pct>0.55 && pct<0.63) return "T"+b;
    return b.toString();
}

function drawOverlay() {
    ctx.strokeStyle = "rgba(255,255,255,0.3)";
    ctx.lineWidth = 2;
    ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y); ctx.lineTo(points[2].x, points[2].y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(points[1].x, points[1].y); ctx.lineTo(points[3].x, points[3].y); ctx.stroke();
    points.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 25, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "white"; ctx.font = "bold 30px sans-serif";
        ctx.fillText(p.label, p.x-15, p.y-40);
    });
    if(lastTip) {
        ctx.fillStyle = "#00d2ff";
        ctx.beginPath(); ctx.arc(lastTip.x, lastTip.y, 15, 0, Math.PI*2); ctx.fill();
    }
}
</script>
</body>
</html>
