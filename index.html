<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DeepDart Pro - ROI Precision</title>
  <style>
    :root {
      --bg: #121212;
      --panel: #1c1c1e;
      --panel2: #2c2c2e;
      --line: #38383a;
      --text: #ffffff;
      --muted: #8e8e93;
      --green: #32d74b;
      --orange: #ff9500;
      --gray: #48484a;
      --blue: #0a84ff;
      --yellow: #ffd60a;
      --red: #ff453a;
      --cyan: #00d2ff;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      touch-action: none;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 60vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      touch-action: none;
    }

    video {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    #ui {
      background: var(--panel);
      height: 40vh;
      padding: 15px;
      border-top: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--panel2);
      padding: 10px;
      border-radius: 12px;
    }

    input[type="range"] {
      flex-grow: 1;
      height: 30px;
      accent-color: var(--blue);
    }

    #hit-display {
      color: var(--green);
      font-size: 2.05rem;
      font-weight: 900;
      text-align: center;
      margin: 2px 0;
      min-height: 2.6rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 2;
      padding: 16px;
      background: var(--orange);
      border: none;
      color: white;
      border-radius: 14px;
      font-weight: bold;
      font-size: 1.05rem;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.99);
    }

    .btn-reset {
      flex: 1;
      background: var(--gray);
    }

    .hint, .debug {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }

    .status-ok { color: var(--green); }
    .status-warn { color: var(--yellow); }
    .status-bad { color: var(--red); }
  </style>
</head>
<body>
  <div class="container">
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
  </div>

  <div id="ui">
    <div class="slider-wrap">
      <span id="zoom-label" style="font-weight:600; min-width:85px;">ZOOM: 1.0x</span>
      <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1" />
    </div>

    <div id="hit-display">VÄNTAR...</div>

    <div class="btn-row">
      <button class="btn btn-reset" id="reset-btn">RESET</button>
      <button class="btn" id="cal-btn">KALIBRERA</button>
    </div>

    <div class="hint">Flytta ringarna till ytterkant: 20, 6, 3, 11</div>
    <div class="debug" id="debug-el">debug: -</div>
  </div>

  <script>
    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    const hitEl = document.getElementById('hit-display');
    const debugEl = document.getElementById('debug-el');
    const zoomSlider = document.getElementById('zoom-slider');
    const zoomLabel = document.getElementById('zoom-label');
    const resetBtn = document.getElementById('reset-btn');
    const calBtn = document.getElementById('cal-btn');

    const fullCanvas = document.createElement('canvas');
    const fullCtx = fullCanvas.getContext('2d', { willReadFrequently: true });

    const motionCanvas = document.createElement('canvas');
    const motionCtx = motionCanvas.getContext('2d', { willReadFrequently: true });

    let refMotionFrame = null;
    let refFullFrame = null;

    let isCalibrated = false;
    let videoTrack = null;
    let supportsHardwareZoom = false;

    let draggedPoint = null;
    let activePointerId = null;
    let lastPointerPosCanvas = null;

    let liveTip = null;
    let lastTip = null;
    let liveROI = null;

    let waitingForBoardToSettle = false;
    let stableFrameCount = 0;
    let tipHistory = [];
    let lockedCandidateStartedAt = 0;

    const stableFramesNeeded = 5;
    const settleBlobThreshold = 4;
    const hitCooldownMs = 700;
    let lastHitTime = 0;

    const HANDLE_RADIUS_CANVAS = 34;
    const HANDLE_HIT_RADIUS_SCREEN = 56;

    const MOTION_SCALE = 0.375;

    const MOTION_DIFF_THRESHOLD = 42;
    const MOTION_MIN_BLOB_AREA = 8;
    const MOTION_MAX_DART_AREA = 180;
    const MOTION_HAND_AREA = 260;

    const ROI_PADDING_FULL = 70;
    const ROI_MIN_SIZE_FULL = 110;

    const FULL_DIFF_THRESHOLD = 70;
    const FULL_POINT_DENSITY_RADIUS = 2;
    const FULL_POINT_MIN_NEIGHBORS = 2;
    const MAX_REFINED_POINTS = 1400;

    const points = [
      { x: 0, y: 0, color: '#ff3b30', label: '20' },
      { x: 0, y: 0, color: '#007aff', label: '6'  },
      { x: 0, y: 0, color: '#ffcc00', label: '3'  },
      { x: 0, y: 0, color: '#34c759', label: '11' }
    ];

    function setStatus(text, type = 'ok') {
      hitEl.textContent = text;
      hitEl.className = '';
      if (type === 'ok') hitEl.classList.add('status-ok');
      if (type === 'warn') hitEl.classList.add('status-warn');
      if (type === 'bad') hitEl.classList.add('status-bad');
    }

    function setDebug(text) {
      debugEl.textContent = text;
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 1280 },
            height: { ideal: 720 },
            facingMode: { ideal: 'environment' }
          },
          audio: false
        });

        video.srcObject = stream;
        videoTrack = stream.getVideoTracks()[0];

        const caps = typeof videoTrack.getCapabilities === 'function'
          ? videoTrack.getCapabilities()
          : {};

        if (caps.zoom) {
          supportsHardwareZoom = true;
          zoomSlider.min = String(caps.zoom.min);
          zoomSlider.max = String(caps.zoom.max);
          zoomSlider.step = String(caps.zoom.step || 0.1);
          zoomSlider.value = String(Math.max(caps.zoom.min, 1));
        } else {
          zoomSlider.min = '1';
          zoomSlider.max = '5';
          zoomSlider.step = '0.1';
          zoomSlider.value = '1';
        }

        video.onloadedmetadata = () => {
          resizeInternalCanvases(video.videoWidth, video.videoHeight);
          resetPoints();
          video.play();
          requestAnimationFrame(process);
        };
      } catch (err) {
        console.error(err);
        setStatus('KAMERA FEL', 'bad');
      }
    }

    function resizeInternalCanvases(w, h) {
      canvas.width = w;
      canvas.height = h;
      fullCanvas.width = w;
      fullCanvas.height = h;

      motionCanvas.width = Math.max(160, Math.round(w * MOTION_SCALE));
      motionCanvas.height = Math.max(90, Math.round(h * MOTION_SCALE));
    }

    function resetPoints() {
      const w = canvas.width || 1280;
      const h = canvas.height || 720;
      const size = Math.min(w, h) * 0.30;

      points[0].x = w / 2;
      points[0].y = h / 2 - size;

      points[1].x = w / 2 + size;
      points[1].y = h / 2;

      points[2].x = w / 2;
      points[2].y = h / 2 + size;

      points[3].x = w / 2 - size;
      points[3].y = h / 2;

      clearCalibration();
      stopDragging();
      setStatus('VÄNTAR...', 'warn');
      setDebug('debug: reset');
    }

    function clearCalibration() {
      refMotionFrame = null;
      refFullFrame = null;
      isCalibrated = false;
      liveTip = null;
      lastTip = null;
      liveROI = null;
      waitingForBoardToSettle = false;
      stableFrameCount = 0;
      tipHistory = [];
      lockedCandidateStartedAt = 0;
    }

    function getCanvasPosFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function getPointScreenPos(point) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: rect.left + (point.x / canvas.width) * rect.width,
        y: rect.top + (point.y / canvas.height) * rect.height
      };
    }

    function findNearestPointFromEvent(e, maxScreenDist = HANDLE_HIT_RADIUS_SCREEN) {
      let best = null;
      let bestDist = Infinity;

      for (const p of points) {
        const sp = getPointScreenPos(p);
        const d = Math.hypot(sp.x - e.clientX, sp.y - e.clientY);
        if (d < maxScreenDist && d < bestDist) {
          best = p;
          bestDist = d;
        }
      }

      return best;
    }

    canvas.addEventListener('pointerdown', (e) => {
      const p = findNearestPointFromEvent(e);
      if (!p) return;

      draggedPoint = p;
      activePointerId = e.pointerId;
      lastPointerPosCanvas = getCanvasPosFromEvent(e);

      try {
        canvas.setPointerCapture(e.pointerId);
      } catch {}

      e.preventDefault();
    }, { passive: false });

    document.addEventListener('pointermove', (e) => {
      if (!draggedPoint || activePointerId === null || e.pointerId !== activePointerId) return;

      const pos = getCanvasPosFromEvent(e);
      draggedPoint.x = clamp(pos.x, 0, canvas.width);
      draggedPoint.y = clamp(pos.y, 0, canvas.height);
      lastPointerPosCanvas = pos;

      clearCalibration();
      setStatus('FLYTTA KLART → KALIBRERA', 'warn');
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('pointerup', (e) => {
      if (activePointerId !== null && e.pointerId === activePointerId) {
        stopDragging();
      }
    });

    document.addEventListener('pointercancel', (e) => {
      if (activePointerId !== null && e.pointerId === activePointerId) {
        stopDragging();
      }
    });

    function stopDragging() {
      draggedPoint = null;
      activePointerId = null;
      lastPointerPosCanvas = null;
    }

    zoomSlider.addEventListener('input', async () => {
      const val = parseFloat(zoomSlider.value);
      zoomLabel.textContent = `ZOOM: ${val.toFixed(1)}x`;

      if (supportsHardwareZoom && videoTrack) {
        try {
          await videoTrack.applyConstraints({ advanced: [{ zoom: val }] });
        } catch (err) {
          console.warn('Zoom applyConstraints misslyckades:', err);
        }
      }

      clearCalibration();
      setStatus('ZOOM ÄNDRAD → KALIBRERA', 'warn');
    });

    resetBtn.addEventListener('click', resetPoints);
    calBtn.addEventListener('click', captureReference);

    function captureReference() {
      if (!canvas.width || !canvas.height) return;

      drawFullFrame();
      drawMotionFrame();

      const motionImage = motionCtx.getImageData(0, 0, motionCanvas.width, motionCanvas.height);
      const fullImage = fullCtx.getImageData(0, 0, fullCanvas.width, fullCanvas.height);

      refMotionFrame = new Uint8ClampedArray(motionImage.data);
      refFullFrame = new Uint8ClampedArray(fullImage.data);

      isCalibrated = true;
      liveTip = null;
      lastTip = null;
      liveROI = null;
      waitingForBoardToSettle = false;
      stableFrameCount = 0;
      tipHistory = [];

      setStatus('REDO!', 'ok');
      setDebug('debug: kalibrerad');
    }

    function drawFullFrame() {
      if (!video.videoWidth || !video.videoHeight) return;

      fullCtx.clearRect(0, 0, fullCanvas.width, fullCanvas.height);

      if (supportsHardwareZoom) {
        fullCtx.drawImage(video, 0, 0, fullCanvas.width, fullCanvas.height);
        return;
      }

      const z = parseFloat(zoomSlider.value);
      const sw = video.videoWidth / z;
      const sh = video.videoHeight / z;
      const sx = (video.videoWidth - sw) / 2;
      const sy = (video.videoHeight - sh) / 2;

      fullCtx.drawImage(
        video,
        sx, sy, sw, sh,
        0, 0, fullCanvas.width, fullCanvas.height
      );
    }

    function drawMotionFrame() {
      motionCtx.clearRect(0, 0, motionCanvas.width, motionCanvas.height);
      motionCtx.drawImage(fullCanvas, 0, 0, motionCanvas.width, motionCanvas.height);
    }

    function process(now = performance.now()) {
      if (!video.videoWidth || !video.videoHeight) {
        requestAnimationFrame(process);
        return;
      }

      drawFullFrame();
      drawMotionFrame();

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(fullCanvas, 0, 0, canvas.width, canvas.height);

      const center = getBoardCenter();
      const radius = getBoardRadius(center);

      if (
        isFinite(center.x) &&
        isFinite(center.y) &&
        radius > 10 &&
        isCalibrated &&
        refMotionFrame &&
        refFullFrame
      ) {
        const motionImage = motionCtx.getImageData(0, 0, motionCanvas.width, motionCanvas.height);
        const motionFrame = motionImage.data;

        const motionCenter = scalePointToMotion(center);
        const motionRadius = radius * MOTION_SCALE;

        const motionResult = detectMotionBlobs(
          refMotionFrame,
          motionFrame,
          motionCanvas.width,
          motionCanvas.height,
          motionCenter,
          motionRadius
        );

        liveTip = null;
        liveROI = null;

        if (motionResult.bestBlob && motionResult.bestBlob.area <= MOTION_HAND_AREA) {
          const liveMotionTip = estimateBlobTip(motionResult.bestBlob.points, motionCenter);
          if (liveMotionTip) {
            liveTip = scalePointFromMotion(liveMotionTip);
            liveROI = motionBlobToFullROI(motionResult.bestBlob);
          }
        }

        const timeSinceLastHit = now - lastHitTime;
        const canStartNewHit = timeSinceLastHit > hitCooldownMs;

        if (!waitingForBoardToSettle) {
          const bestArea = motionResult.bestBlob ? motionResult.bestBlob.area : 0;
          const isHand = bestArea >= MOTION_HAND_AREA;
          const plausibleDart =
            motionResult.bestBlob &&
            bestArea >= MOTION_MIN_BLOB_AREA &&
            bestArea <= MOTION_MAX_DART_AREA &&
            !isHand;

          setDebug(`debug: blobs=${motionResult.blobs.length} best=${bestArea} hand=${isHand ? 'ja' : 'nej'} live=${liveTip ? 'ja' : 'nej'}`);

          if (plausibleDart && canStartNewHit && liveROI) {
            waitingForBoardToSettle = true;
            stableFrameCount = 0;
            tipHistory = [];
            lockedCandidateStartedAt = now;
          }
        } else {
          const fullImage = fullCtx.getImageData(0, 0, fullCanvas.width, fullCanvas.height);
          const fullFrame = fullImage.data;

          let refinedTip = null;

          if (liveROI) {
            refinedTip = refineTipInROI(refFullFrame, fullFrame, liveROI, center);
          }

          if (!refinedTip && liveTip && isLikelyOnBoard(liveTip, center, radius)) {
            refinedTip = liveTip;
          }

          if (refinedTip && isLikelyOnBoard(refinedTip, center, radius)) {
            tipHistory.push({ x: refinedTip.x, y: refinedTip.y });
            if (tipHistory.length > 20) tipHistory.shift();
          }

          const blobArea = motionResult.bestBlob ? motionResult.bestBlob.area : 0;
          const stableNow = blobArea < settleBlobThreshold;

          if (stableNow) {
            stableFrameCount++;
          } else {
            stableFrameCount = 0;
          }

          setDebug(`debug: settle area=${blobArea} stable=${stableFrameCount}/${stableFramesNeeded} tips=${tipHistory.length}`);

          if (stableFrameCount >= stableFramesNeeded || (now - lockedCandidateStartedAt) > 1200) {
            const locked = refineLockedTip(tipHistory, center, radius);

            if (locked) {
              lastTip = locked;
              setStatus(calculateScore(locked, center, radius), 'ok');
              lastHitTime = now;
            } else {
              setStatus('INGEN TRÄFF', 'warn');
            }

            refMotionFrame = new Uint8ClampedArray(motionFrame);
            refFullFrame = new Uint8ClampedArray(fullFrame);

            waitingForBoardToSettle = false;
            stableFrameCount = 0;
            tipHistory = [];
            liveROI = null;
          }
        }
      }

      drawOverlay(center, radius);
      requestAnimationFrame(process);
    }

    function detectMotionBlobs(referenceFrame, currentFrame, w, h, center, radius) {
      const searchRadius = radius * 1.18;
      const minX = Math.max(0, Math.floor(center.x - searchRadius));
      const maxX = Math.min(w - 1, Math.ceil(center.x + searchRadius));
      const minY = Math.max(0, Math.floor(center.y - searchRadius));
      const maxY = Math.min(h - 1, Math.ceil(center.y + searchRadius));

      const roiW = maxX - minX + 1;
      const roiH = maxY - minY + 1;

      const mask = new Uint8Array(roiW * roiH);

      for (let y = minY; y <= maxY; y++) {
        for (let x = minX; x <= maxX; x++) {
          const dx = x - center.x;
          const dy = y - center.y;
          if ((dx * dx + dy * dy) > searchRadius * searchRadius) continue;

          const i = (y * w + x) * 4;
          const diff =
            Math.abs(referenceFrame[i] - currentFrame[i]) +
            Math.abs(referenceFrame[i + 1] - currentFrame[i + 1]) +
            Math.abs(referenceFrame[i + 2] - currentFrame[i + 2]);

          if (diff > MOTION_DIFF_THRESHOLD) {
            mask[(y - minY) * roiW + (x - minX)] = 1;
          }
        }
      }

      const blobs = extractBlobs(mask, roiW, roiH, minX, minY);
      let bestBlob = null;
      let bestScore = -Infinity;

      for (const blob of blobs) {
        const c = blob.center;
        const dist = Math.hypot(c.x - center.x, c.y - center.y);
        const aspect = Math.max(blob.width, blob.height) / Math.max(1, Math.min(blob.width, blob.height));
        const areaScore = Math.min(blob.area, MOTION_MAX_DART_AREA) * 3;
        const shapeScore = aspect * 8;
        const score = areaScore + shapeScore - dist * 0.08;

        if (score > bestScore) {
          bestScore = score;
          bestBlob = blob;
        }
      }

      return { blobs, bestBlob };
    }

    function extractBlobs(mask, w, h, offsetX, offsetY) {
      const blobs = [];
      const visited = new Uint8Array(mask.length);
      const qx = new Int32Array(mask.length);
      const qy = new Int32Array(mask.length);

      for (let y = 0; y < h; y++) {
        for (let x = 0; x < w; x++) {
          const startIdx = y * w + x;
          if (!mask[startIdx] || visited[startIdx]) continue;

          let qh = 0;
          let qt = 0;

          visited[startIdx] = 1;
          qx[qt] = x;
          qy[qt] = y;
          qt++;

          const pts = [];
          let minX = x, maxX = x, minY = y, maxY = y;
          let sumX = 0, sumY = 0;

          while (qh < qt) {
            const cx = qx[qh];
            const cy = qy[qh];
            qh++;

            pts.push({ x: cx + offsetX, y: cy + offsetY });
            sumX += cx + offsetX;
            sumY += cy + offsetY;

            if (cx < minX) minX = cx;
            if (cx > maxX) maxX = cx;
            if (cy < minY) minY = cy;
            if (cy > maxY) maxY = cy;

            for (let ny = cy - 1; ny <= cy + 1; ny++) {
              for (let nx = cx - 1; nx <= cx + 1; nx++) {
                if (nx < 0 || ny < 0 || nx >= w || ny >= h) continue;
                const ni = ny * w + nx;
                if (!mask[ni] || visited[ni]) continue;
                visited[ni] = 1;
                qx[qt] = nx;
                qy[qt] = ny;
                qt++;
              }
            }
          }

          const area = pts.length;
          if (area < MOTION_MIN_BLOB_AREA) continue;

          const width = maxX - minX + 1;
          const height = maxY - minY + 1;

          blobs.push({
            area,
            width,
            height,
            minX: minX + offsetX,
            maxX: maxX + offsetX,
            minY: minY + offsetY,
            maxY: maxY + offsetY,
            center: {
              x: sumX / area,
              y: sumY / area
            },
            points: pts
          });
        }
      }

      return blobs;
    }

    function motionBlobToFullROI(blob) {
      const scale = 1 / MOTION_SCALE;

      let minX = Math.floor(blob.minX * scale) - ROI_PADDING_FULL;
      let minY = Math.floor(blob.minY * scale) - ROI_PADDING_FULL;
      let maxX = Math.ceil((blob.maxX + 1) * scale) + ROI_PADDING_FULL;
      let maxY = Math.ceil((blob.maxY + 1) * scale) + ROI_PADDING_FULL;

      if ((maxX - minX) < ROI_MIN_SIZE_FULL) {
        const cx = (minX + maxX) / 2;
        minX = Math.floor(cx - ROI_MIN_SIZE_FULL / 2);
        maxX = Math.ceil(cx + ROI_MIN_SIZE_FULL / 2);
      }

      if ((maxY - minY) < ROI_MIN_SIZE_FULL) {
        const cy = (minY + maxY) / 2;
        minY = Math.floor(cy - ROI_MIN_SIZE_FULL / 2);
        maxY = Math.ceil(cy + ROI_MIN_SIZE_FULL / 2);
      }

      return {
        minX: clamp(minX, 0, fullCanvas.width - 1),
        minY: clamp(minY, 0, fullCanvas.height - 1),
        maxX: clamp(maxX, 1, fullCanvas.width),
        maxY: clamp(maxY, 1, fullCanvas.height)
      };
    }

    function refineTipInROI(referenceFrame, currentFrame, roi, boardCenter) {
      const points = [];
      const width = fullCanvas.width;

      for (let y = roi.minY; y < roi.maxY; y++) {
        for (let x = roi.minX; x < roi.maxX; x++) {
          const i = (y * width + x) * 4;

          const diff =
            Math.abs(referenceFrame[i] - currentFrame[i]) +
            Math.abs(referenceFrame[i + 1] - currentFrame[i + 1]) +
            Math.abs(referenceFrame[i + 2] - currentFrame[i + 2]);

          if (diff > FULL_DIFF_THRESHOLD) {
            points.push({ x, y });
            if (points.length >= MAX_REFINED_POINTS) break;
          }
        }
        if (points.length >= MAX_REFINED_POINTS) break;
      }

      if (points.length < 10) return null;

      const densePoints = filterDensePoints(points, FULL_POINT_DENSITY_RADIUS, FULL_POINT_MIN_NEIGHBORS);
      if (densePoints.length < 8) return null;

      const axis = principalAxis(densePoints);
      if (!axis) return null;

      const center = axis.center;
      const dir = axis.dir;

      let endA = null;
      let endB = null;
      let minProj = Infinity;
      let maxProj = -Infinity;

      for (const p of densePoints) {
        const proj = (p.x - center.x) * dir.x + (p.y - center.y) * dir.y;
        if (proj < minProj) {
          minProj = proj;
          endA = p;
        }
        if (proj > maxProj) {
          maxProj = proj;
          endB = p;
        }
      }

      if (!endA || !endB) return null;

      const da = Math.hypot(endA.x - boardCenter.x, endA.y - boardCenter.y);
      const db = Math.hypot(endB.x - boardCenter.x, endB.y - boardCenter.y);

      return da < db ? endA : endB;
    }

    function filterDensePoints(points, radius, minNeighbors) {
      const cellSize = Math.max(1, radius);
      const grid = new Map();

      for (const p of points) {
        const gx = Math.floor(p.x / cellSize);
        const gy = Math.floor(p.y / cellSize);
        const key = `${gx},${gy}`;
        if (!grid.has(key)) grid.set(key, []);
        grid.get(key).push(p);
      }

      const out = [];

      for (const p of points) {
        const gx = Math.floor(p.x / cellSize);
        const gy = Math.floor(p.y / cellSize);
        let neighbors = 0;

        for (let yy = gy - 1; yy <= gy + 1; yy++) {
          for (let xx = gx - 1; xx <= gx + 1; xx++) {
            const key = `${xx},${yy}`;
            const arr = grid.get(key);
            if (!arr) continue;

            for (const q of arr) {
              if (Math.abs(q.x - p.x) <= radius && Math.abs(q.y - p.y) <= radius) {
                neighbors++;
                if (neighbors >= minNeighbors + 1) break;
              }
            }
            if (neighbors >= minNeighbors + 1) break;
          }
          if (neighbors >= minNeighbors + 1) break;
        }

        if (neighbors >= minNeighbors + 1) {
          out.push(p);
        }
      }

      return out;
    }

    function principalAxis(points) {
      if (!points.length) return null;

      let meanX = 0;
      let meanY = 0;
      for (const p of points) {
        meanX += p.x;
        meanY += p.y;
      }
      meanX /= points.length;
      meanY /= points.length;

      let sxx = 0;
      let syy = 0;
      let sxy = 0;

      for (const p of points) {
        const dx = p.x - meanX;
        const dy = p.y - meanY;
        sxx += dx * dx;
        syy += dy * dy;
        sxy += dx * dy;
      }

      const trace = sxx + syy;
      const detTerm = Math.sqrt(Math.max(0, ((sxx - syy) * (sxx - syy)) + 4 * sxy * sxy));
      const lambda = (trace + detTerm) / 2;

      let vx = sxy;
      let vy = lambda - sxx;

      if (Math.abs(vx) < 1e-6 && Math.abs(vy) < 1e-6) {
        vx = 1;
        vy = 0;
      }

      const mag = Math.hypot(vx, vy);
      if (mag < 1e-6) return null;

      return {
        center: { x: meanX, y: meanY },
        dir: { x: vx / mag, y: vy / mag }
      };
    }

    function estimateBlobTip(blobPoints, center) {
      if (!blobPoints || !blobPoints.length) return null;

      let avgX = 0;
      let avgY = 0;
      for (const p of blobPoints) {
        avgX += p.x;
        avgY += p.y;
      }
      avgX /= blobPoints.length;
      avgY /= blobPoints.length;

      const vx = center.x - avgX;
      const vy = center.y - avgY;
      const mag = Math.hypot(vx, vy);
      if (mag < 1) return null;

      let best = null;
      let bestProj = -Infinity;

      for (const p of blobPoints) {
        const proj = ((p.x - avgX) * vx / mag) + ((p.y - avgY) * vy / mag);
        if (proj > bestProj) {
          bestProj = proj;
          best = p;
        }
      }

      return best;
    }

    function refineLockedTip(history, center, radius) {
      if (!history.length) return null;

      const filtered = history.filter(p => isLikelyOnBoard(p, center, radius));
      if (!filtered.length) return null;

      const xs = filtered.map(p => p.x).sort((a, b) => a - b);
      const ys = filtered.map(p => p.y).sort((a, b) => a - b);

      const mx = median(xs);
      const my = median(ys);

      let best = filtered[0];
      let bestDist = Infinity;

      for (const p of filtered) {
        const d = Math.hypot(p.x - mx, p.y - my);
        if (d < bestDist) {
          bestDist = d;
          best = p;
        }
      }

      return best;
    }

    function median(arr) {
      const mid = Math.floor(arr.length / 2);
      return arr.length % 2 === 0 ? (arr[mid - 1] + arr[mid]) / 2 : arr[mid];
    }

    function scalePointToMotion(p) {
      return {
        x: p.x * MOTION_SCALE,
        y: p.y * MOTION_SCALE
      };
    }

    function scalePointFromMotion(p) {
      return {
        x: p.x / MOTION_SCALE,
        y: p.y / MOTION_SCALE
      };
    }

    function getBoardCenter() {
      return getLineIntersection(points[0], points[2], points[1], points[3]);
    }

    function getBoardRadius(center) {
      if (!isFinite(center.x) || !isFinite(center.y)) return 0;

      const r1 = Math.hypot(points[0].x - center.x, points[0].y - center.y);
      const r2 = Math.hypot(points[1].x - center.x, points[1].y - center.y);
      const r3 = Math.hypot(points[2].x - center.x, points[2].y - center.y);
      const r4 = Math.hypot(points[3].x - center.x, points[3].y - center.y);

      return (r1 + r2 + r3 + r4) / 4;
    }

    function isLikelyOnBoard(tip, center, radius) {
      return Math.hypot(tip.x - center.x, tip.y - center.y) <= radius * 1.08;
    }

    function getLineIntersection(p1, p2, p3, p4) {
      const d = (p4.y - p3.y) * (p2.x - p1.x) - (p4.x - p3.x) * (p2.y - p1.y);

      if (Math.abs(d) < 0.0001) {
        return {
          x: (p1.x + p2.x + p3.x + p4.x) / 4,
          y: (p1.y + p2.y + p3.y + p4.y) / 4
        };
      }

      const ua = ((p4.x - p3.x) * (p1.y - p3.y) - (p4.y - p3.y) * (p1.x - p3.x)) / d;

      return {
        x: p1.x + ua * (p2.x - p1.x),
        y: p1.y + ua * (p2.y - p1.y)
      };
    }

    function calculateScore(tip, center, radius) {
      const dx = tip.x - center.x;
      const dy = tip.y - center.y;

      let ang = (Math.atan2(dy, dx) * 180 / Math.PI) + 90 + 9;
      while (ang < 0) ang += 360;
      ang %= 360;

      const pct = Math.hypot(dx, dy) / radius;

      if (pct > 1.05) return 'MISS';
      if (pct < 0.037) return 'BULL (50)';
      if (pct < 0.092) return 'BULL (25)';

      const segs = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
      const base = segs[Math.floor(ang / 18)];

      if (pct >= 0.90 && pct <= 1.00) return 'D' + base;
      if (pct >= 0.53 && pct <= 0.63) return 'T' + base;

      return String(base);
    }

    function drawOverlay(center, radius) {
      if (!isFinite(center.x) || !isFinite(center.y) || radius <= 0) return;

      ctx.save();

      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 6]);

      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      ctx.lineTo(points[2].x, points[2].y);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(points[1].x, points[1].y);
      ctx.lineTo(points[3].x, points[3].y);
      ctx.stroke();

      ctx.setLineDash([]);

      ctx.strokeStyle = 'rgba(255,255,255,0.20)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(center.x, center.y, radius, 0, Math.PI * 2);
      ctx.stroke();

      if (liveROI) {
        ctx.strokeStyle = waitingForBoardToSettle ? 'rgba(255,214,10,0.9)' : 'rgba(0,210,255,0.9)';
        ctx.lineWidth = 2;
        ctx.strokeRect(
          liveROI.minX,
          liveROI.minY,
          Math.max(1, liveROI.maxX - liveROI.minX),
          Math.max(1, liveROI.maxY - liveROI.minY)
        );
      }

      for (const p of points) {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, HANDLE_RADIUS_CANVAS, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = 'white';
        ctx.font = 'bold 24px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.label, p.x, p.y);
      }

      if (draggedPoint && lastPointerPosCanvas) {
        const magSize = 220;
        const magX = 10;
        const magY = 10;
        const srcSize = 110;

        let sx = draggedPoint.x - srcSize / 2;
        let sy = draggedPoint.y - srcSize / 2;

        sx = clamp(sx, 0, fullCanvas.width - srcSize);
        sy = clamp(sy, 0, fullCanvas.height - srcSize);

        ctx.save();
        ctx.beginPath();
        ctx.rect(magX, magY, magSize, magSize);
        ctx.clip();

        ctx.drawImage(
          fullCanvas,
          sx, sy, srcSize, srcSize,
          magX, magY, magSize, magSize
        );

        ctx.strokeStyle = draggedPoint.color;
        ctx.lineWidth = 4;
        ctx.strokeRect(magX, magY, magSize, magSize);

        ctx.beginPath();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 1;
        ctx.moveTo(magX + magSize / 2, magY);
        ctx.lineTo(magX + magSize / 2, magY + magSize);
        ctx.moveTo(magX, magY + magSize / 2);
        ctx.lineTo(magX + magSize, magY + magSize / 2);
        ctx.stroke();

        ctx.restore();
      }

      if (liveTip && !waitingForBoardToSettle) {
        ctx.fillStyle = 'rgba(0,210,255,0.92)';
        ctx.beginPath();
        ctx.arc(liveTip.x, liveTip.y, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      if (waitingForBoardToSettle && liveTip) {
        ctx.fillStyle = 'rgba(255,214,10,0.96)';
        ctx.beginPath();
        ctx.arc(liveTip.x, liveTip.y, 9, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      if (lastTip) {
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        ctx.beginPath();
        ctx.arc(lastTip.x, lastTip.y, 12, 0, Math.PI * 2);
        ctx.stroke();

        ctx.strokeStyle = 'rgba(0,210,255,0.95)';
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.moveTo(lastTip.x - 18, lastTip.y);
        ctx.lineTo(lastTip.x + 18, lastTip.y);
        ctx.moveTo(lastTip.x, lastTip.y - 18);
        ctx.lineTo(lastTip.x, lastTip.y + 18);
        ctx.stroke();
      }

      ctx.restore();
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    startCamera();
  </script>
