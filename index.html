<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>DeepDart Pro - Precision Edition</title>
    <style>
        body {
            background: #121212;
            color: white;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            margin: 0;
            overflow: hidden;
            touch-action: none;
        }

        .container {
            position: relative;
            width: 100vw;
            height: 60vh;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        canvas {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            touch-action: none;
            display: block;
        }

        video {
            position: absolute;
            opacity: 0;
            pointer-events: none;
        }

        #ui {
            background: #1c1c1e;
            height: 40vh;
            padding: 15px;
            border-top: 1px solid #38383a;
            box-sizing: border-box;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .slider-wrap {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #2c2c2e;
            padding: 10px;
            border-radius: 12px;
        }

        input[type=range] {
            flex-grow: 1;
            height: 30px;
            accent-color: #0a84ff;
        }

        #hit-display {
            color: #32d74b;
            font-size: 2.2rem;
            font-weight: 900;
            text-align: center;
            margin: 2px 0;
        }

        .btn-row {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 2;
            padding: 16px;
            background: #ff9500;
            border: none;
            color: white;
            border-radius: 14px;
            font-weight: bold;
            font-size: 1.1rem;
        }

        .btn-reset {
            flex: 1;
            background: #48484a;
        }

        .hint {
            font-size: 0.75rem;
            color: #8e8e93;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
    </div>

    <div id="ui">
        <div class="slider-wrap">
            <span id="zoom-label" style="font-weight:600; min-width:85px;">ZOOM: 1.0x</span>
            <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1" />
        </div>

        <div id="hit-display">VÄNTAR...</div>

        <div class="btn-row">
            <button class="btn btn-reset" onclick="resetPoints()">RESET</button>
            <button class="btn" onclick="captureReference()">KALIBRERA</button>
        </div>

        <div class="hint">Flytta ringarna till ytterkant: 20, 6, 3, 11</div>
    </div>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const hitEl = document.getElementById('hit-display');
const zoomSlider = document.getElementById('zoom-slider');
const zoomLabel = document.getElementById('zoom-label');

const offscreenCanvas = document.createElement('canvas');
const offscreenCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });

let refFrame = null;
let isCalibrated = false;
let videoTrack = null;
let supportsHardwareZoom = false;
let lastTip = null;
let lastTouchPos = null;
let draggedPoint = null;

let lastDetectionTime = 0;
let detectionCooldownMs = 1200;
let stableFramesAfterHit = 0;
let waitingForBoardToSettle = false;

let points = [
    { x: 0, y: 0, color: '#ff3b30', label: '20' },
    { x: 0, y: 0, color: '#007aff', label: '6' },
    { x: 0, y: 0, color: '#ffcc00', label: '3' },
    { x: 0, y: 0, color: '#34c759', label: '11' }
];

startCamera();

async function startCamera() {
    try {
        const stream = await navigator.mediaDevices.getUserMedia({
            video: {
                width: { ideal: 1920 },
                height: { ideal: 1080 },
                facingMode: { ideal: "environment" }
            },
            audio: false
        });

        video.srcObject = stream;
        videoTrack = stream.getVideoTracks()[0];

        const caps = videoTrack.getCapabilities ? videoTrack.getCapabilities() : {};
        if (caps.zoom) {
            supportsHardwareZoom = true;
            zoomSlider.min = caps.zoom.min;
            zoomSlider.max = caps.zoom.max;
            zoomSlider.step = caps.zoom.step || 0.1;
            zoomSlider.value = Math.max(caps.zoom.min, 1);
        }

        video.onloadedmetadata = () => {
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            offscreenCanvas.width = video.videoWidth;
            offscreenCanvas.height = video.videoHeight;

            resetPoints();
            video.play();
            requestAnimationFrame(process);
        };
    } catch (err) {
        console.error(err);
        hitEl.innerText = "KAMERA FEL";
    }
}

function resetPoints() {
    const w = canvas.width || 1280;
    const h = canvas.height || 720;
    const size = Math.min(w, h) * 0.25;

    points[0].x = w / 2;
    points[0].y = h / 2 - size;
    points[1].x = w / 2 + size;
    points[1].y = h / 2;
    points[2].x = w / 2;
    points[2].y = h / 2 + size;
    points[3].x = w / 2 - size;
    points[3].y = h / 2;

    isCalibrated = false;
    refFrame = null;
    lastTip = null;
    hitEl.innerText = "VÄNTAR...";
}

function getPointerPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;

    return {
        x: (clientX - rect.left) * (canvas.width / rect.width),
        y: (clientY - rect.top) * (canvas.height / rect.height)
    };
}

canvas.addEventListener('touchstart', (e) => {
    const pos = getPointerPos(e);
    let best = null;
    let bestDist = Infinity;
    for (const p of points) {
        const d = Math.hypot(p.x - pos.x, p.y - pos.y);
        if (d < 90 && d < bestDist) {
            best = p;
            bestDist = d;
        }
    }
    draggedPoint = best;
    if (draggedPoint) {
        lastTouchPos = pos;
        e.preventDefault();
    }
}, { passive: false });

window.addEventListener('touchmove', (e) => {
    if (!draggedPoint) return;
    const pos = getPointerPos(e);
    // Fix: Ingen offset längre eftersom vi har förstoringsglas
    draggedPoint.x = pos.x;
    draggedPoint.y = pos.y;
    lastTouchPos = pos;
    isCalibrated = false;
    refFrame = null;
    e.preventDefault();
}, { passive: false });

window.addEventListener('touchend', () => { draggedPoint = null; lastTouchPos = null; });

zoomSlider.oninput = async () => {
    const val = parseFloat(zoomSlider.value);
    zoomLabel.innerText = `ZOOM: ${val.toFixed(1)}x`;
    if (supportsHardwareZoom && videoTrack) {
        await videoTrack.applyConstraints({ advanced: [{ zoom: val }] });
    }
    isCalibrated = false;
    refFrame = null;
};

function captureReference() {
    if (!canvas.width) return;
    drawVideoFrame(offscreenCtx, offscreenCanvas);
    refFrame = new Uint8ClampedArray(offscreenCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height).data);
    isCalibrated = true;
    lastTip = null;
    hitEl.innerText = "REDO!";
}

function drawVideoFrame(targetCtx, targetCanvas) {
    if (supportsHardwareZoom) {
        targetCtx.drawImage(video, 0, 0, targetCanvas.width, targetCanvas.height);
    } else {
        const z = parseFloat(zoomSlider.value);
        const sw = video.videoWidth / z;
        const sh = video.videoHeight / z;
        targetCtx.drawImage(video, (video.videoWidth - sw) / 2, (video.videoHeight - sh) / 2, sw, sh, 0, 0, targetCanvas.width, targetCanvas.height);
    }
}

function process() {
    if (!video.videoWidth) { requestAnimationFrame(process); return; }
    drawVideoFrame(offscreenCtx, offscreenCanvas);
    const currentFrame = offscreenCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height).data;
    ctx.drawImage(offscreenCanvas, 0, 0, canvas.width, canvas.height);

    if (isCalibrated && refFrame) {
        const now = performance.now();
        if ((now - lastDetectionTime) > detectionCooldownMs && !waitingForBoardToSettle) {
            const moves = [];
            for (let y = 80; y < canvas.height - 80; y += 4) { // Tätare sökning (4 istället för 6)
                for (let x = 80; x < canvas.width - 80; x += 4) {
                    const i = (y * canvas.width + x) * 4;
                    const diff = Math.abs(refFrame[i] - currentFrame[i]) + Math.abs(refFrame[i+1] - currentFrame[i+1]) + Math.abs(refFrame[i+2] - currentFrame[i+2]);
                    if (diff > 100) moves.push({ x, y });
                }
            }

            if (moves.length > 20 && moves.length < 1500) {
                const center = getBoardCenter();
                const tip = estimateTip(moves, center);
                if (tip && isLikelyOnBoard(tip, center)) {
                    lastTip = tip;
                    hitEl.innerText = calculateScore(tip, center);
                    lastDetectionTime = now;
                    waitingForBoardToSettle = true;
                }
            }
        } else if (waitingForBoardToSettle) {
            stableFramesAfterHit++;
            if (stableFramesAfterHit > 10) {
                refFrame = new Uint8ClampedArray(currentFrame);
                waitingForBoardToSettle = false;
                stableFramesAfterHit = 0;
            }
        }
    }
    drawOverlay();
    requestAnimationFrame(process);
}

function estimateTip(moves, center) {
    let avgX = 0, avgY = 0;
    moves.forEach(m => { avgX += m.x; avgY += m.y; });
    avgX /= moves.length; avgY /= moves.length;
    const vx = center.x - avgX, vy = center.y - avgY;
    const mag = Math.hypot(vx, vy);
    let bestTip = null, bestProj = -Infinity;
    moves.forEach(m => {
        const proj = ((m.x - avgX) * vx / mag) + ((m.y - avgY) * vy / mag);
        if (proj > bestProj) { bestProj = proj; bestTip = m; }
    });
    return bestTip;
}

function getBoardCenter() { return getLineIntersection(points[0], points[2], points[1], points[3]); }
function getBoardRadius(center) { 
    return (Math.hypot(points[0].x - center.x, points[0].y - center.y) + 
            Math.hypot(points[1].x - center.x, points[1].y - center.y)) / 2; 
}
function isLikelyOnBoard(tip, center) { return Math.hypot(tip.x - center.x, tip.y - center.y) <= getBoardRadius(center) * 1.1; }

function getLineIntersection(p1, p2, p3, p4) {
    const d = (p4.y - p3.y) * (p2.x - p1.x) - (p4.x - p3.x) * (p2.y - p1.y);
    const ua = ((p4.x - p3.x) * (p1.y - p3.y) - (p4.y - p3.y) * (p1.x - p3.x)) / d;
    return { x: p1.x + ua * (p2.x - p1.x), y: p1.y + ua * (p2.y - p1.y) };
}

function calculateScore(tip, center) {
    const dx = tip.x - center.x, dy = tip.y - center.y;
    // MATEMATISK FIX: +90 flyttar 0 till toppen, +9 centrerar 20-segmentet
    let ang = (Math.atan2(dy, dx) * 180 / Math.PI) + 90 + 9;
    while (ang < 0) ang += 360;
    ang %= 360;

    const r = getBoardRadius(center);
    const pct = Math.hypot(dx, dy) / r;

    if (pct > 1.05) return "MISS";
    if (pct < 0.04) return "BULL (50)";
    if (pct < 0.09) return "BULL (25)";

    const segs = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
    const base = segs[Math.floor(ang / 18)];

    if (pct > 0.92) return "D" + base;
    if (pct > 0.55 && pct < 0.64) return "T" + base;
    return String(base);
}

function drawOverlay() {
    const center = getBoardCenter();
    const radius = getBoardRadius(center);

    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.setLineDash([5, 5]);
    ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y); ctx.lineTo(points[2].x, points[2].y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(points[1].x, points[1].y); ctx.lineTo(points[3].x, points[3].y); ctx.stroke();
    ctx.setLineDash([]);

    points.forEach(p => {
        ctx.fillStyle = p.color; ctx.beginPath(); ctx.arc(p.x, p.y, 28, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.lineWidth = 3; ctx.stroke();
        ctx.fillStyle = "white"; ctx.font = "bold 24px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText(p.label, p.x, p.y);
    });

    if (draggedPoint && lastTouchPos) {
        const magSize = 200, magX = 10, magY = 10, srcSize = 100;
        ctx.save();
        ctx.beginPath(); ctx.rect(magX, magY, magSize, magSize); ctx.clip();
        ctx.drawImage(offscreenCanvas, draggedPoint.x - srcSize/2, draggedPoint.y - srcSize/2, srcSize, srcSize, magX, magY, magSize, magSize);
        ctx.strokeStyle = draggedPoint.color; ctx.lineWidth = 4; ctx.strokeRect(magX, magY, magSize, magSize);
        ctx.beginPath(); ctx.strokeStyle = "white"; ctx.lineWidth = 1;
        ctx.moveTo(magX + magSize/2, magY); ctx.lineTo(magX + magSize/2, magY + magSize);
        ctx.moveTo(magX, magY + magSize/2); ctx.lineTo(magX + magSize, magY + magSize/2); ctx.stroke();
        ctx.restore();
    }

    if (lastTip) {
        ctx.fillStyle = "#00d2ff"; ctx.beginPath(); ctx.arc(lastTip.x, lastTip.y, 10, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.stroke();
    }
}
</script>
</body>
</html>
