<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepDart Pro - Perspective Warp</title>
    <style>
        body { background: #121212; color: white; font-family: sans-serif; text-align: center; margin: 0; overflow: hidden; touch-action: none; }
        .container { position: relative; width: 100vw; height: 75vh; background: #000; overflow: hidden; }
        canvas { width: 100%; height: 100%; object-fit: contain; }
        video { position: absolute; opacity: 0; pointer-events: none; }
        #ui { background: #222; height: 25vh; padding: 10px; border-top: 2px solid #444; position: fixed; bottom: 0; width: 100%; box-sizing: border-box; }
        .btn { padding: 15px; background: #27ae60; border: none; color: white; border-radius: 5px; width: 100%; font-weight: bold; font-size: 1.1rem; margin-top: 5px; }
        #hit-display { color: #2ecc71; font-size: 2rem; margin: 5px 0; font-weight: bold; }
        .instructions { font-size: 0.8rem; color: #aaa; margin-bottom: 5px; }
    </style>
</head>
<body>

    <div class="container" id="canvas-container">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
    </div>

    <div id="ui">
        <div class="instructions">Dra cirklarna till ytterkant: 20 (Röd), 6 (Blå), 3 (Gul), 11 (Grön)</div>
        <div id="hit-display">VÄNTAR...</div>
        <button class="btn" onclick="captureReference()">KALIBRERA NU</button>
    </div>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const hitEl = document.getElementById('hit-display');

let refFrame = null;
let isCalibrated = false;
let lastTip = null;

// De 4 kalibreringspunkterna (12, 3, 6, 9 klockan)
let points = [
    { x: 500, y: 200, color: 'red', label: '20' },   // Topp
    { x: 800, y: 500, color: 'blue', label: '6' },   // Höger
    { x: 500, y: 800, color: 'yellow', label: '3' }, // Botten
    { x: 200, y: 500, color: 'green', label: '11' }  // Vänster
];

let draggedPoint = null;

// Starta kamera
navigator.mediaDevices.getUserMedia({ 
    video: { width: { ideal: 1920 }, height: { ideal: 1080 }, facingMode: "environment" } 
}).then(s => { 
    video.srcObject = s;
    video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        // Placera punkter initialt i en cirkel mitt i bild
        const cx = canvas.width/2; const cy = canvas.height/2; const r = canvas.height * 0.3;
        points[0].x = cx; points[0].y = cy - r;
        points[1].x = cx + r; points[1].y = cy;
        points[2].x = cx; points[2].y = cy + r;
        points[3].x = cx - r; points[3].y = cy;
        video.play();
        requestAnimationFrame(process);
    };
});

// Touch/Mus-hantering för att flytta punkter
canvas.addEventListener('pointerdown', e => {
    const rect = canvas.getBoundingClientRect();
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    const mouseX = (e.clientX - rect.left) * scaleX;
    const mouseY = (e.clientY - rect.top) * scaleY;

    points.forEach(p => {
        const d = Math.sqrt((p.x - mouseX)**2 + (p.y - mouseY)**2);
        if (d < 50) draggedPoint = p;
    });
});

window.addEventListener('pointermove', e => {
    if (draggedPoint) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        draggedPoint.x = (e.clientX - rect.left) * scaleX;
        draggedPoint.y = (e.clientY - rect.top) * scaleY;
        isCalibrated = false; // Måste kalibrera om när vi flyttar siktet
    }
});

window.addEventListener('pointerup', () => draggedPoint = null);

function captureReference() {
    ctx.drawImage(video, 0, 0);
    const frame = ctx.getImageData(0, 0, canvas.width, canvas.height);
    refFrame = new Uint8ClampedArray(frame.data);
    isCalibrated = true;
    lastTip = null;
    hitEl.innerText = "REDO!";
}

function process() {
    ctx.drawImage(video, 0, 0);
    
    if (isCalibrated) {
        const currentFrame = ctx.getImageData(0, 0, canvas.width, canvas.height).data;
        let movements = [];
        const sensitivity = 45;

        // Analysera bara området inuti våra punkter (bounding box)
        const minX = Math.min(...points.map(p => p.x));
        const maxX = Math.max(...points.map(p => p.x));
        const minY = Math.min(...points.map(p => p.y));
        const maxY = Math.max(...points.map(p => p.y));

        for (let y = Math.floor(minY); y < maxY; y += 5) {
            for (let x = Math.floor(minX); x < maxX; x += 5) {
                const idx = (y * canvas.width + x) * 4;
                if (refFrame[idx] - currentFrame[idx] > sensitivity) {
                    movements.push({x, y});
                }
            }
        }

        if (movements.length > 20 && movements.length < 2000) {
            analyzeHit(movements, currentFrame);
        }
    }
    
    drawOverlay();
    requestAnimationFrame(process);
}

function analyzeHit(movements, currentFrame) {
    // 1. Beräkna tavlans mitt (där linjerna 20-3 och 6-11 korsas)
    const boardCenter = getLineIntersection(points[0], points[2], points[1], points[3]);
    
    // 2. Hitta pilens tyngdpunkt
    let avgX = 0, avgY = 0;
    movements.forEach(m => { avgX += m.x; avgY += m.y; });
    avgX /= movements.length; avgY /= movements.length;

    // 3. Vektor från pil till center
    const vX = boardCenter.x - avgX;
    const vY = boardCenter.y - avgY;
    const mag = Math.sqrt(vX*vX + vY*vY);

    // 4. Hitta spetsen (den pixel som "sticker ut" mest mot mitten)
    let bestTip = null;
    let maxPull = -Infinity;

    movements.forEach(m => {
        const pull = (m.x - avgX) * (vX/mag) + (m.y - avgY) * (vY/mag);
        if (pull > maxPull) {
            maxPull = pull;
            bestTip = m;
        }
    });

    if (bestTip) {
        lastTip = bestTip;
        hitEl.innerText = calculateAdvancedScore(bestTip, boardCenter);
        refFrame = new Uint8ClampedArray(currentFrame);
    }
}

function calculateAdvancedScore(tip, center) {
    const dx = tip.x - center.x;
    const dy = tip.y - center.y;
    
    // Beräkna vinkel
    let angle = Math.atan2(dy, dx) * (180 / Math.PI);
    angle = (angle + 90 + 9) % 360;
    if (angle < 0) angle += 360;
    
    // Dynamisk radie-beräkning baserat på perspektivpunkterna
    // (Vi kollar hur långt det är till kanten i just denna vinkel)
    const distToCenter = Math.sqrt(dx*dx + dy*dy);
    const avgBoardRadius = (Math.sqrt((points[0].x-center.x)**2 + (points[0].y-center.y)**2) + 
                            Math.sqrt((points[1].x-center.x)**2 + (points[1].y-center.y)**2)) / 2;
    
    const pct = distToCenter / avgBoardRadius;

    if (pct > 1.05) return "MISS";
    if (pct < 0.04) return "BULL (50)";
    if (pct < 0.09) return "BULL (25)";

    const segments = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
    const base = segments[Math.floor(angle / 18)];

    if (pct > 0.93) return "D" + base;
    if (pct > 0.55 && pct < 0.63) return "T" + base;
    return base.toString();
}

// Matematik för att hitta var två linjer korsas
function getLineIntersection(p1, p2, p3, p4) {
    const ua = ((p4.x - p3.x) * (p1.y - p3.y) - (p4.y - p3.y) * (p1.x - p3.x)) / 
               ((p4.y - p3.y) * (p2.x - p1.x) - (p4.x - p3.x) * (p2.y - p1.y));
    return {
        x: p1.x + ua * (p2.x - p1.x),
        y: p1.y + ua * (p2.y - p1.y)
    };
}

function drawOverlay() {
    // Rita linjer mellan punkterna för att visa tavlans struktur
    ctx.lineWidth = 2;
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y); ctx.lineTo(points[2].x, points[2].y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(points[1].x, points[1].y); ctx.lineTo(points[3].x, points[3].y); ctx.stroke();

    // Rita kalibreringspunkterna
    points.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 15, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "white";
        ctx.fillText(p.label, p.x - 5, p.y - 20);
    });

    if (lastTip) {
        ctx.fillStyle = "#00d2ff";
        ctx.shadowBlur = 15; ctx.shadowColor = "cyan";
        ctx.beginPath(); ctx.arc(lastTip.x, lastTip.y, 12, 0, Math.PI*2); ctx.fill();
        ctx.shadowBlur = 0;
    }
}
</script>
</body>
</html>
