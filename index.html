<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>DeepDart Pro - Precision Edition</title>
  <style>
    :root {
      --bg: #121212;
      --panel: #1c1c1e;
      --panel2: #2c2c2e;
      --line: #38383a;
      --text: #ffffff;
      --muted: #8e8e93;
      --green: #32d74b;
      --orange: #ff9500;
      --gray: #48484a;
      --blue: #0a84ff;
      --yellow: #ffd60a;
      --red: #ff453a;
    }

    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      -webkit-user-select: none;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, sans-serif;
      touch-action: none;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .container {
      position: relative;
      width: 100vw;
      height: 60vh;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      touch-action: none;
    }

    canvas {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: contain;
      touch-action: none;
    }

    video {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      width: 1px;
      height: 1px;
    }

    #ui {
      background: var(--panel);
      height: 40vh;
      padding: 15px;
      border-top: 1px solid var(--line);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .slider-wrap {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--panel2);
      padding: 10px;
      border-radius: 12px;
    }

    input[type="range"] {
      flex-grow: 1;
      height: 30px;
      accent-color: var(--blue);
    }

    #hit-display {
      color: var(--green);
      font-size: 2.1rem;
      font-weight: 900;
      text-align: center;
      margin: 2px 0;
      min-height: 2.6rem;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .btn-row {
      display: flex;
      gap: 10px;
    }

    .btn {
      flex: 2;
      padding: 16px;
      background: var(--orange);
      border: none;
      color: white;
      border-radius: 14px;
      font-weight: bold;
      font-size: 1.05rem;
      cursor: pointer;
    }

    .btn:active {
      transform: scale(0.99);
    }

    .btn-reset {
      flex: 1;
      background: var(--gray);
    }

    .hint {
      font-size: 0.78rem;
      color: var(--muted);
      text-align: center;
    }

    .status-ok { color: var(--green); }
    .status-warn { color: var(--yellow); }
    .status-bad { color: var(--red); }
  </style>
</head>
<body>
  <div class="container">
    <video id="v" autoplay playsinline muted></video>
    <canvas id="c"></canvas>
  </div>

  <div id="ui">
    <div class="slider-wrap">
      <span id="zoom-label" style="font-weight:600; min-width:85px;">ZOOM: 1.0x</span>
      <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1" />
    </div>

    <div id="hit-display">VÄNTAR...</div>

    <div class="btn-row">
      <button class="btn btn-reset" id="reset-btn">RESET</button>
      <button class="btn" id="cal-btn">KALIBRERA</button>
    </div>

    <div class="hint">Flytta ringarna till ytterkant: 20, 6, 3, 11</div>
  </div>

  <script>
    const video = document.getElementById('v');
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    const hitEl = document.getElementById('hit-display');
    const zoomSlider = document.getElementById('zoom-slider');
    const zoomLabel = document.getElementById('zoom-label');
    const resetBtn = document.getElementById('reset-btn');
    const calBtn = document.getElementById('cal-btn');

    const offscreenCanvas = document.createElement('canvas');
    const offscreenCtx = offscreenCanvas.getContext('2d', { willReadFrequently: true });

    let refFrame = null;
    let isCalibrated = false;
    let videoTrack = null;
    let supportsHardwareZoom = false;

    let draggedPoint = null;
    let activePointerId = null;
    let lastPointerPosCanvas = null;
    let lastTip = null;

    let lastDetectionTime = 0;
    const detectionCooldownMs = 900;

    let waitingForBoardToSettle = false;
    let stableFrameCount = 0;
    const stableFramesNeeded = 6;
    const settleMotionThreshold = 120;

    const HANDLE_RADIUS_CANVAS = 34;
    const HANDLE_HIT_RADIUS_SCREEN = 56;

    const points = [
      { x: 0, y: 0, color: '#ff3b30', label: '20' },
      { x: 0, y: 0, color: '#007aff', label: '6'  },
      { x: 0, y: 0, color: '#ffcc00', label: '3'  },
      { x: 0, y: 0, color: '#34c759', label: '11' }
    ];

    function setStatus(text, type = 'ok') {
      hitEl.textContent = text;
      hitEl.className = '';
      if (type === 'ok') hitEl.classList.add('status-ok');
      if (type === 'warn') hitEl.classList.add('status-warn');
      if (type === 'bad') hitEl.classList.add('status-bad');
    }

    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: {
            width: { ideal: 1920 },
            height: { ideal: 1080 },
            facingMode: { ideal: 'environment' }
          },
          audio: false
        });

        video.srcObject = stream;
        videoTrack = stream.getVideoTracks()[0];

        const caps = typeof videoTrack.getCapabilities === 'function'
          ? videoTrack.getCapabilities()
          : {};

        if (caps.zoom) {
          supportsHardwareZoom = true;
          zoomSlider.min = String(caps.zoom.min);
          zoomSlider.max = String(caps.zoom.max);
          zoomSlider.step = String(caps.zoom.step || 0.1);
          zoomSlider.value = String(Math.max(caps.zoom.min, 1));
        } else {
          zoomSlider.min = '1';
          zoomSlider.max = '5';
          zoomSlider.step = '0.1';
          zoomSlider.value = '1';
        }

        video.onloadedmetadata = () => {
          resizeInternalCanvases(video.videoWidth, video.videoHeight);
          resetPoints();
          video.play();
          requestAnimationFrame(process);
        };
      } catch (err) {
        console.error(err);
        setStatus('KAMERA FEL', 'bad');
      }
    }

    function resizeInternalCanvases(w, h) {
      canvas.width = w;
      canvas.height = h;
      offscreenCanvas.width = w;
      offscreenCanvas.height = h;
    }

    function resetPoints() {
      const w = canvas.width || 1280;
      const h = canvas.height || 720;
      const size = Math.min(w, h) * 0.30;

      points[0].x = w / 2;
      points[0].y = h / 2 - size;

      points[1].x = w / 2 + size;
      points[1].y = h / 2;

      points[2].x = w / 2;
      points[2].y = h / 2 + size;

      points[3].x = w / 2 - size;
      points[3].y = h / 2;

      clearCalibration();
      stopDragging();
      setStatus('VÄNTAR...', 'warn');
    }

    function clearCalibration() {
      isCalibrated = false;
      refFrame = null;
      lastTip = null;
      waitingForBoardToSettle = false;
      stableFrameCount = 0;
    }

    function getCanvasPosFromEvent(e) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: (e.clientX - rect.left) * (canvas.width / rect.width),
        y: (e.clientY - rect.top) * (canvas.height / rect.height)
      };
    }

    function getPointScreenPos(point) {
      const rect = canvas.getBoundingClientRect();
      return {
        x: rect.left + (point.x / canvas.width) * rect.width,
        y: rect.top + (point.y / canvas.height) * rect.height
      };
    }

    function findNearestPointFromEvent(e, maxScreenDist = HANDLE_HIT_RADIUS_SCREEN) {
      let best = null;
      let bestDist = Infinity;

      for (const p of points) {
        const sp = getPointScreenPos(p);
        const d = Math.hypot(sp.x - e.clientX, sp.y - e.clientY);
        if (d < maxScreenDist && d < bestDist) {
          best = p;
          bestDist = d;
        }
      }

      return best;
    }

    canvas.addEventListener('pointerdown', (e) => {
      const p = findNearestPointFromEvent(e);

      if (!p) return;

      draggedPoint = p;
      activePointerId = e.pointerId;
      lastPointerPosCanvas = getCanvasPosFromEvent(e);

      try {
        canvas.setPointerCapture(e.pointerId);
      } catch (err) {
        // Ignorera om browsern inte gillar detta
      }

      e.preventDefault();
    }, { passive: false });

    document.addEventListener('pointermove', (e) => {
      if (!draggedPoint || activePointerId === null || e.pointerId !== activePointerId) return;

      const pos = getCanvasPosFromEvent(e);
      draggedPoint.x = clamp(pos.x, 0, canvas.width);
      draggedPoint.y = clamp(pos.y, 0, canvas.height);
      lastPointerPosCanvas = pos;

      clearCalibration();
      setStatus('FLYTTA KLART → KALIBRERA', 'warn');
      e.preventDefault();
    }, { passive: false });

    document.addEventListener('pointerup', (e) => {
      if (activePointerId !== null && e.pointerId === activePointerId) {
        stopDragging();
      }
    });

    document.addEventListener('pointercancel', (e) => {
      if (activePointerId !== null && e.pointerId === activePointerId) {
        stopDragging();
      }
    });

    function stopDragging() {
      draggedPoint = null;
      activePointerId = null;
      lastPointerPosCanvas = null;
    }

    zoomSlider.addEventListener('input', async () => {
      const val = parseFloat(zoomSlider.value);
      zoomLabel.textContent = `ZOOM: ${val.toFixed(1)}x`;

      if (supportsHardwareZoom && videoTrack) {
        try {
          await videoTrack.applyConstraints({
            advanced: [{ zoom: val }]
          });
        } catch (err) {
          console.warn('Zoom applyConstraints misslyckades:', err);
        }
      }

      clearCalibration();
      setStatus('ZOOM ÄNDRAD → KALIBRERA', 'warn');
    });

    resetBtn.addEventListener('click', resetPoints);
    calBtn.addEventListener('click', captureReference);

    function captureReference() {
      if (!canvas.width || !canvas.height) return;

      drawVideoFrame(offscreenCtx, offscreenCanvas);

      const img = offscreenCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height);
      refFrame = new Uint8ClampedArray(img.data);
      isCalibrated = true;
      waitingForBoardToSettle = false;
      stableFrameCount = 0;
      lastTip = null;

      setStatus('REDO!', 'ok');
    }

    function drawVideoFrame(targetCtx, targetCanvas) {
      if (!video.videoWidth || !video.videoHeight) return;

      targetCtx.clearRect(0, 0, targetCanvas.width, targetCanvas.height);

      if (supportsHardwareZoom) {
        targetCtx.drawImage(video, 0, 0, targetCanvas.width, targetCanvas.height);
        return;
      }

      const z = parseFloat(zoomSlider.value);
      const sw = video.videoWidth / z;
      const sh = video.videoHeight / z;
      const sx = (video.videoWidth - sw) / 2;
      const sy = (video.videoHeight - sh) / 2;

      targetCtx.drawImage(
        video,
        sx, sy, sw, sh,
        0, 0, targetCanvas.width, targetCanvas.height
      );
    }

    function process(now = performance.now()) {
      if (!video.videoWidth || !video.videoHeight) {
        requestAnimationFrame(process);
        return;
      }

      drawVideoFrame(offscreenCtx, offscreenCanvas);

      const frame = offscreenCtx.getImageData(0, 0, offscreenCanvas.width, offscreenCanvas.height);
      const currentFrame = frame.data;

      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.drawImage(offscreenCanvas, 0, 0, canvas.width, canvas.height);

      const center = getBoardCenter();
      const radius = getBoardRadius(center);

      if (isFinite(center.x) && isFinite(center.y) && radius > 10 && isCalibrated && refFrame) {
        const analysis = detectMotion(refFrame, currentFrame, canvas.width, canvas.height);

        if (!waitingForBoardToSettle) {
          const enoughTimePassed = (now - lastDetectionTime) > detectionCooldownMs;
          const plausibleMotion = analysis.moves.length > 25 && analysis.moves.length < 2200;

          if (enoughTimePassed && plausibleMotion) {
            const tip = estimateTip(analysis.moves, center);

            if (tip && isLikelyOnBoard(tip, center, radius)) {
              lastTip = tip;
              setStatus(calculateScore(tip, center, radius), 'ok');
              lastDetectionTime = now;
              waitingForBoardToSettle = true;
              stableFrameCount = 0;
            }
          }
        } else {
          const movementNow = analysis.moves.length;
          const isStable = movementNow < settleMotionThreshold;

          if (isStable) {
            stableFrameCount++;
          } else {
            stableFrameCount = 0;
          }

          if (stableFrameCount >= stableFramesNeeded) {
            refFrame = new Uint8ClampedArray(currentFrame);
            waitingForBoardToSettle = false;
            stableFrameCount = 0;
          }
        }
      }

      drawOverlay(center, radius);
      requestAnimationFrame(process);
    }

    function detectMotion(referenceFrame, currentFrame, w, h) {
      const moves = [];
      const step = 4;
      const margin = 80;

      for (let y = margin; y < h - margin; y += step) {
        for (let x = margin; x < w - margin; x += step) {
          const i = (y * w + x) * 4;

          const dr = Math.abs(referenceFrame[i] - currentFrame[i]);
          const dg = Math.abs(referenceFrame[i + 1] - currentFrame[i + 1]);
          const db = Math.abs(referenceFrame[i + 2] - currentFrame[i + 2]);

          const diff = dr + dg + db;

          if (diff > 95) {
            moves.push({ x, y });
          }
        }
      }

      return { moves };
    }

    function estimateTip(moves, center) {
      if (!moves || moves.length === 0) return null;

      let avgX = 0;
      let avgY = 0;

      for (const m of moves) {
        avgX += m.x;
        avgY += m.y;
      }

      avgX /= moves.length;
      avgY /= moves.length;

      const vx = center.x - avgX;
      const vy = center.y - avgY;
      const mag = Math.hypot(vx, vy);

      if (mag < 1) return null;

      let bestTip = null;
      let bestProj = -Infinity;

      for (const m of moves) {
        const proj = ((m.x - avgX) * vx / mag) + ((m.y - avgY) * vy / mag);
        if (proj > bestProj) {
          bestProj = proj;
          bestTip = m;
        }
      }

      return bestTip;
    }

    function getBoardCenter() {
      return getLineIntersection(points[0], points[2], points[1], points[3]);
    }

    function getBoardRadius(center) {
      if (!isFinite(center.x) || !isFinite(center.y)) return 0;

      const r1 = Math.hypot(points[0].x - center.x, points[0].y - center.y);
      const r2 = Math.hypot(points[1].x - center.x, points[1].y - center.y);
      const r3 = Math.hypot(points[2].x - center.x, points[2].y - center.y);
      const r4 = Math.hypot(points[3].x - center.x, points[3].y - center.y);

      return (r1 + r2 + r3 + r4) / 4;
    }

    function isLikelyOnBoard(tip, center, radius) {
      return Math.hypot(tip.x - center.x, tip.y - center.y) <= radius * 1.08;
    }

    function getLineIntersection(p1, p2, p3, p4) {
      const d = (p4.y - p3.y) * (p2.x - p1.x) - (p4.x - p3.x) * (p2.y - p1.y);

      if (Math.abs(d) < 0.0001) {
        return {
          x: (p1.x + p2.x + p3.x + p4.x) / 4,
          y: (p1.y + p2.y + p3.y + p4.y) / 4
        };
      }

      const ua = ((p4.x - p3.x) * (p1.y - p3.y) - (p4.y - p3.y) * (p1.x - p3.x)) / d;

      return {
        x: p1.x + ua * (p2.x - p1.x),
        y: p1.y + ua * (p2.y - p1.y)
      };
    }

    function calculateScore(tip, center, radius) {
      const dx = tip.x - center.x;
      const dy = tip.y - center.y;

      let ang = (Math.atan2(dy, dx) * 180 / Math.PI) + 90 + 9;
      while (ang < 0) ang += 360;
      ang %= 360;

      const pct = Math.hypot(dx, dy) / radius;

      if (pct > 1.05) return 'MISS';
      if (pct < 0.037) return 'BULL (50)';
      if (pct < 0.092) return 'BULL (25)';

      const segs = [20, 1, 18, 4, 13, 6, 10, 15, 2, 17, 3, 19, 7, 16, 8, 11, 14, 9, 12, 5];
      const base = segs[Math.floor(ang / 18)];

      if (pct >= 0.90 && pct <= 1.00) return 'D' + base;
      if (pct >= 0.53 && pct <= 0.63) return 'T' + base;

      return String(base);
    }

    function drawOverlay(center, radius) {
      if (!isFinite(center.x) || !isFinite(center.y) || radius <= 0) return;

      ctx.save();

      ctx.strokeStyle = 'rgba(255,255,255,0.25)';
      ctx.lineWidth = 2;
      ctx.setLineDash([6, 6]);

      ctx.beginPath();
      ctx.moveTo(points[0].x, points[0].y);
      ctx.lineTo(points[2].x, points[2].y);
      ctx.stroke();

      ctx.beginPath();
      ctx.moveTo(points[1].x, points[1].y);
      ctx.lineTo(points[3].x, points[3].y);
      ctx.stroke();

      ctx.setLineDash([]);

      ctx.strokeStyle = 'rgba(255,255,255,0.20)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.arc(center.x, center.y, radius, 0, Math.PI * 2);
      ctx.stroke();

      for (const p of points) {
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x, p.y, HANDLE_RADIUS_CANVAS, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'white';
        ctx.lineWidth = 3;
        ctx.stroke();

        ctx.fillStyle = 'white';
        ctx.font = 'bold 24px sans-serif';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        ctx.fillText(p.label, p.x, p.y);
      }

      if (draggedPoint && lastPointerPosCanvas) {
        const magSize = 220;
        const magX = 10;
        const magY = 10;
        const srcSize = 110;

        let sx = draggedPoint.x - srcSize / 2;
        let sy = draggedPoint.y - srcSize / 2;

        sx = clamp(sx, 0, offscreenCanvas.width - srcSize);
        sy = clamp(sy, 0, offscreenCanvas.height - srcSize);

        ctx.save();
        ctx.beginPath();
        ctx.rect(magX, magY, magSize, magSize);
        ctx.clip();

        ctx.drawImage(
          offscreenCanvas,
          sx, sy, srcSize, srcSize,
          magX, magY, magSize, magSize
        );

        ctx.strokeStyle = draggedPoint.color;
        ctx.lineWidth = 4;
        ctx.strokeRect(magX, magY, magSize, magSize);

        ctx.beginPath();
        ctx.strokeStyle = 'white';
        ctx.lineWidth = 1;
        ctx.moveTo(magX + magSize / 2, magY);
        ctx.lineTo(magX + magSize / 2, magY + magSize);
        ctx.moveTo(magX, magY + magSize / 2);
        ctx.lineTo(magX + magSize, magY + magSize / 2);
        ctx.stroke();

        ctx.restore();
      }

      if (lastTip) {
        ctx.fillStyle = '#00d2ff';
        ctx.beginPath();
        ctx.arc(lastTip.x, lastTip.y, 10, 0, Math.PI * 2);
        ctx.fill();

        ctx.strokeStyle = 'white';
        ctx.lineWidth = 2;
        ctx.stroke();
      }

      ctx.restore();
    }

    function clamp(v, min, max) {
      return Math.max(min, Math.min(max, v));
    }

    startCamera();
  </script>
</body>
</html>
