<!DOCTYPE html>
<html lang="sv">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DeepDart Pro - Final Fix</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #121212; color: white; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; touch-action: none; }
        
        /* Den stabila containern från tidigare */
        .container { 
            position: relative; 
            width: 100vw; 
            height: 60vh; 
            background: #000; 
            overflow: hidden;
        }
        
        /* Canvasen som täcker skärmen perfekt */
        canvas { 
            width: 100%; 
            height: 100%; 
            object-fit: contain; 
        }
        
        video { position: absolute; opacity: 0; pointer-events: none; }
        
        #ui { 
            background: #222; 
            height: 40vh; 
            padding: 15px; 
            border-top: 2px solid #444; 
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .slider-wrap { 
            display: flex; 
            align-items: center; 
            gap: 10px; 
            background: #333; 
            padding: 10px; 
            border-radius: 8px; 
        }
        
        input[type=range] { flex: 1; height: 30px; }

        #hit-display { 
            color: #2ecc71; 
            font-size: 2.5rem; 
            font-weight: bold; 
            text-align: center;
            margin: 5px 0;
        }
        
        .btn-group { display: flex; gap: 10px; }
        .btn { 
            flex: 2;
            padding: 18px; 
            background: #e67e22; 
            border: none; 
            color: white; 
            border-radius: 8px; 
            font-weight: bold; 
            font-size: 1.2rem;
        }
        .btn-alt { flex: 1; background: #555; }
    </style>
</head>
<body>

    <div class="container">
        <video id="v" autoplay playsinline muted></video>
        <canvas id="c"></canvas>
    </div>

    <div id="ui">
        <div class="slider-wrap">
            <span id="zoom-label" style="min-width: 80px;">ZOOM: 1x</span>
            <input type="range" id="zoom-slider" min="1" max="5" step="0.1" value="1">
        </div>

        <div id="hit-display">VÄNTAR...</div>
        
        <div class="btn-group">
            <button class="btn btn-alt" onclick="resetPoints()">RESET</button>
            <button class="btn" onclick="captureReference()">KALIBRERA</button>
        </div>
    </div>

<script>
const video = document.getElementById('v');
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d', { willReadFrequently: true });
const hitEl = document.getElementById('hit-display');
const zoomSlider = document.getElementById('zoom-slider');
const zoomLabel = document.getElementById('zoom-label');

let refFrame = null;
let isCalibrated = false;
let videoTrack = null;
let supportsHardwareZoom = false;
let lastTip = null;

let points = [
    { x: 0, y: 0, color: 'red', label: '20' },
    { x: 0, y: 0, color: 'blue', label: '6' },
    { x: 0, y: 0, color: 'yellow', label: '3' },
    { x: 0, y: 0, color: 'green', label: '11' }
];
let draggedPoint = null;

navigator.mediaDevices.getUserMedia({ 
    video: { width: { ideal: 1280 }, height: { ideal: 720 }, facingMode: "environment" } 
}).then(s => { 
    video.srcObject = s;
    videoTrack = s.getVideoTracks()[0];
    const caps = videoTrack.getCapabilities();
    if (caps.zoom) {
        supportsHardwareZoom = true;
        zoomSlider.min = caps.zoom.min;
        zoomSlider.max = caps.zoom.max;
        zoomSlider.step = caps.zoom.step;
    }
    video.onloadedmetadata = () => {
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        resetPoints();
        video.play();
        requestAnimationFrame(process);
    };
});

function resetPoints() {
    const w = canvas.width, h = canvas.height;
    points[0] = { x: w * 0.5, y: h * 0.2, color: 'red', label: '20' };
    points[1] = { x: w * 0.8, y: h * 0.5, color: 'blue', label: '6' };
    points[2] = { x: w * 0.5, y: h * 0.8, color: 'yellow', label: '3' };
    points[3] = { x: w * 0.2, y: h * 0.5, color: 'green', label: '11' };
    isCalibrated = false;
}

// FIX: Exakt touch-mappning oavsett iPhone-modell
function getPos(e) {
    const rect = canvas.getBoundingClientRect();
    const clientX = e.touches ? e.touches[0].clientX : e.clientX;
    const clientY = e.touches ? e.touches[0].clientY : e.clientY;
    
    // Räkna ut var på den faktiska bilden (canvasen) man trycker
    const scaleX = canvas.width / rect.width;
    const scaleY = canvas.height / rect.height;
    
    return {
        x: (clientX - rect.left) * scaleX,
        y: (clientY - rect.top) * scaleY
    };
}

canvas.addEventListener('touchstart', e => {
    const pos = getPos(e);
    points.forEach(p => {
        const d = Math.sqrt((p.x - pos.x)**2 + (p.y - pos.y)**2);
        if (d < 70) draggedPoint = p; // Stor träffyta för fingrar
    });
    if(draggedPoint) e.preventDefault();
}, {passive: false});

window.addEventListener('touchmove', e => {
    if (draggedPoint) {
        const pos = getPos(e);
        draggedPoint.x = pos.x;
        draggedPoint.y = pos.y;
        isCalibrated = false;
        e.preventDefault();
    }
}, {passive: false});

window.addEventListener('touchend', () => draggedPoint = null);

zoomSlider.oninput = () => {
    const val = parseFloat(zoomSlider.value);
    zoomLabel.innerText = `ZOOM: ${val.toFixed(1)}x`;
    if (supportsHardwareZoom) {
        videoTrack.applyConstraints({ advanced: [{ zoom: val }] });
    }
    isCalibrated = false;
};

function captureReference() {
    ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    refFrame = new Uint8ClampedArray(ctx.getImageData(0,0,canvas.width,canvas.height).data);
    isCalibrated = true;
    lastTip = null;
    hitEl.innerText = "REDO!";
}

function process() {
    // Rita kameran
    if (supportsHardwareZoom) {
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
    } else {
        const z = parseFloat(zoomSlider.value);
        const sw = video.videoWidth / z, sh = video.videoHeight / z;
        ctx.drawImage(video, (video.videoWidth-sw)/2, (video.videoHeight-sh)/2, sw, sh, 0, 0, canvas.width, canvas.height);
    }
    
    if (isCalibrated) {
        const currentFrame = ctx.getImageData(0,0,canvas.width,canvas.height).data;
        let moves = [];
        // Snabbanalys
        for(let y=50; y<canvas.height-50; y+=6) {
            for(let x=50; x<canvas.width-50; x+=6) {
                const i = (y*canvas.width+x)*4;
                if(refFrame[i]-currentFrame[i] > 45) moves.push({x,y});
            }
        }

        if(moves.length > 15 && moves.length < 1500) {
            // Beräkna centrum från korsande linjer
            const d = (points[3].y-points[1].y)*(points[0].x-points[2].x)-(points[3].x-points[1].x)*(points[0].y-points[2].y);
            const ua = ((points[3].x-points[1].x)*(points[2].y-points[1].y)-(points[3].y-points[1].y)*(points[2].x-points[1].x))/d;
            const center = { x: points[2].x+ua*(points[0].x-points[2].x), y: points[2].y+ua*(points[0].y-points[2].y) };
            
            let sumX=0, sumY=0; moves.forEach(m=>{sumX+=m.x; sumY+=m.y;});
            const avgX=sumX/moves.length, avgY=sumY/moves.length;
            const vX=center.x-avgX, vY=center.y-avgY;
            const mag=Math.sqrt(vX*vX+vY*vY);
            
            let bestT=null, maxP=-Infinity;
            moves.forEach(m=>{
                const p = (m.x-avgX)*(vX/mag) + (m.y-avgY)*(vY/mag);
                if(p>maxP){ maxP=p; bestT=m; }
            });
            if(bestT) {
                lastTip = bestT;
                hitEl.innerText = calculateScore(bestT, center);
                refFrame = new Uint8ClampedArray(currentFrame);
            }
        }
    }
    drawOverlay();
    requestAnimationFrame(process);
}

function calculateScore(tip, center) {
    const dx=tip.x-center.x, dy=tip.y-center.y;
    let ang = Math.atan2(dy,dx)*(180/Math.PI)+90+9;
    if(ang<0) ang+=360;
    const r = (Math.abs(points[0].y-center.y) + Math.abs(points[1].x-center.x))/2;
    const pct = Math.sqrt(dx*dx+dy*dy)/r;
    if(pct>1.05) return "MISS";
    if(pct<0.04) return "BULL (50)";
    if(pct<0.09) return "BULL (25)";
    const segs = [20,1,18,4,13,6,10,15,2,17,3,19,7,16,8,11,14,9,12,5];
    const b = segs[Math.floor((ang%360)/18)];
    if(pct>0.93) return "D"+b;
    if(pct>0.55 && pct<0.63) return "T"+b;
    return b.toString();
}

function drawOverlay() {
    // Hjälplinjer
    ctx.strokeStyle = "rgba(255,255,255,0.2)";
    ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y); ctx.lineTo(points[2].x, points[2].y); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(points[1].x, points[1].y); ctx.lineTo(points[3].x, points[3].y); ctx.stroke();

    points.forEach(p => {
        ctx.fillStyle = p.color;
        ctx.beginPath(); ctx.arc(p.x, p.y, 25, 0, Math.PI*2); ctx.fill();
        ctx.strokeStyle = "white"; ctx.stroke();
    });
    if(lastTip) {
        ctx.fillStyle = "#00d2ff";
        ctx.beginPath(); ctx.arc(lastTip.x, lastTip.y, 15, 0, Math.PI*2); ctx.fill();
    }
}
</script>
</body>
</html>
